<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz ATTT - 150 Cau</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Tahoma,sans-serif;background:#f0f4f8;color:#333;min-height:100vh;display:flex;justify-content:center;padding:20px}
.container{max-width:800px;width:100%}
h1{text-align:center;color:#1a56db;margin:20px 0;font-size:1.5em}
#info{text-align:center;color:#666;margin-bottom:20px;font-size:0.9em}
#startScreen,#resultScreen{text-align:center;background:white;border-radius:12px;padding:40px 30px;box-shadow:0 2px 12px rgba(0,0,0,0.08);margin-top:40px}
#startScreen h2,#resultScreen h2{margin-bottom:15px;color:#1a56db}
#startScreen p{margin-bottom:25px;color:#666;line-height:1.6}
.btn{background:#1a56db;color:white;border:none;padding:12px 32px;border-radius:8px;font-size:1em;cursor:pointer;transition:background .2s}
.btn:hover{background:#1648c0}
.btn:disabled{background:#94a3b8;cursor:not-allowed}
#quizArea{display:none}
#progress{display:flex;align-items:center;gap:12px;margin-bottom:15px;flex-wrap:wrap}
#progressBar{flex:1;height:8px;background:#e2e8f0;border-radius:4px;overflow:hidden;min-width:100px}
#progressFill{height:100%;background:#1a56db;border-radius:4px;transition:width .3s}
#qCounter{font-size:.85em;color:#666;white-space:nowrap}
#card{background:white;border-radius:12px;padding:25px;box-shadow:0 2px 12px rgba(0,0,0,0.08)}
#qBadge{display:inline-block;background:#e8f0fe;color:#1a56db;padding:4px 12px;border-radius:12px;font-size:.8em;margin-bottom:12px}
#qText{font-size:1.05em;line-height:1.6;margin-bottom:20px}
.opt{display:block;width:100%;text-align:left;padding:12px 16px;margin:6px 0;border:2px solid #e2e8f0;border-radius:8px;background:white;cursor:pointer;font-size:.95em;transition:all .15s}
.opt:hover:not(.disabled){border-color:#93c5fd;background:#f0f7ff}
.opt.selected{border-color:#1a56db;background:#e8f0fe}
.opt.correct{border-color:#16a34a;background:#dcfce7}
.opt.wrong{border-color:#dc2626;background:#fee2e2}
.opt.disabled{cursor:default;opacity:.85}
#nav{display:flex;justify-content:space-between;align-items:center;margin-top:20px;gap:10px}
#nav .btn{padding:10px 24px;font-size:.9em}
#qDots{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:15px}
.dot{width:22px;height:22px;border-radius:50%;border:2px solid #cbd5e1;background:white;cursor:pointer;font-size:.65em;display:flex;align-items:center;justify-content:center;transition:all .15s}
.dot.answered{border-color:#1a56db;background:#dbeafe}
.dot.correct{border-color:#16a34a;background:#bbf7d0}
.dot.wrong{border-color:#dc2626;background:#fecaca}
.dot.current{border-width:3px;border-color:#1a56db;transform:scale(1.1)}
#resultScreen{display:none}
.score{font-size:2.5em;font-weight:bold;color:#1a56db;margin:15px 0}
.score-detail{color:#666;margin-bottom:20px;line-height:1.6}
#reviewList{text-align:left;margin-top:20px;max-height:400px;overflow-y:auto}
.reviewItem{padding:12px;border-bottom:1px solid #e2e8f0}
.reviewItem:last-child{border-bottom:none}
.reviewItem .rq{font-weight:600;margin-bottom:4px}
.reviewItem .ra{font-size:.9em;color:#666}
.reviewItem .ra.c{color:#16a34a}
.reviewItem .ra.w{color:#dc2626}
@media(max-width:600px){
body{padding:10px}
#card{padding:16px}
.opt{padding:10px 12px;font-size:.9em}
#qDots{gap:3px}
.dot{width:18px;height:18px;font-size:.55em}
}
</style>
</head>
<body>
<div class="container">
<h1>&#x1F4DA; Quiz ATTT - 150 C&#x00E2;u</h1>
<div id="info">150 c&#x00E2;u h&#x1ECF;i An to&#xE0;n th&#x00F4;ng tin</div>

<div id="startScreen">
  <h2>&#x1F3AF; B&#x1EAF;t &#x111;&#x1EA7;u l&#xE0;m b&#xE0;i</h2>
  <p>50 c&#x00E2;u tr&#x1EAF;c nghi&#x1EC7;m ng&#x1EAB;u nhi&#xEA;n<br>t&#x1EEB; ng&#x00E2;n h&#xE0;ng c&#x00E2;u h&#x1ECF;i SQA.</p>
  <button class="btn" onclick="startQuiz()">&#x25B6; L&#xE0;m b&#xE0;i ngay</button>

<div id="quizArea">

    <span id="qCounter">1 / 50</span>
    <div id="progressBar"><div id="progressFill"></div></div>

  <div id="card">

  </div>

<div id="resultScreen">

  <div class="score" id="scoreDisplay">0/50</div>
  <div class="score-detail" id="scoreDetail"></div>
  <button class="btn" onclick="startQuiz()">&#x1F504; L&#xE0;m l&#x1EA1;i (b&#x1EAF;t &#x111;&#x1EA7;u l&#x1EA1;i)</button>
  <div id="reviewList"></div>
</div>
</div>

<script>
var ALL_QUESTIONS = [{"id": "001", "text": "Ba mục tiêu cốt lõi của an toàn thông tin (mô hình CIA) bao gồm những yếu tố nào?", "opts": ["Confidentiality (Tính bảo mật) — Integration (Tính tích hợp) — Authentication (Xác thực)", "Confidentiality (Tính bảo mật) - Integrity (Tính toàn vẹn) — Availability (Tính sẵn sàng)", "Control (Kiểm soát) — Integrity (Tính toàn vẹn) — Access (Truy cập)", "Cryptography (Mã hóa) - Integrity (Tính toàn vẹn) -— Availability (Tính sẵn sàng)"], "answer": 1}, {"id": "002", "text": "Nguyên tắc 'Least Privilege' (Quyền tối thiểu) trong bảo mật hệ thống được hiểu như thế nào?", "opts": ["Cấp cho người dùng tất cả các quyền để làm việc dễ dàng.", "Không cấp bất kỳ quyền truy cập nào cho nhân viên thông thường.", "Chỉ cấp đúng các quyền tối thiểu cần thiết để hoàn thành công việc được giao.", "Cấp quyền truy cập dựa trên thâm niên làm việc."], "answer": 2}, {"id": "003", "text": "Chiến lược phòng thủ 'Defense in Depth' (Phòng thủ chiều sâu) có đặc điểm gì?", "opts": ["Sử dụng một bức tường lửa thật mạnh ở vòng ngoài.", "Sử dụng nhiều lớp bảo vệ độc lập từ ngoài vào trong.", "Chỉ tập trung bảo mật cho lớp cơ sở dữ liệu cốt lõi.", "Giấu toàn bộ mã nguồn của ứng dụng."], "answer": 1}, {"id": "004", "text": "Yếu tố nào được coi là tuyến phòng thủ quan trọng nhất nhưng cũng là mắt xích yếu nhất trong an ninh mạng?", "opts": ["Hệ thống Firewall", "Thuật toán mã hóa", "Con người (Người dùng và Quản trị viên)", "Hệ thống IDS"], "answer": 2}, {"id": "005", "text": "Tấn công 'Passive Attack' (Tấn công thụ động) khác với tấn công chủ động ở điểm nào?", "opts": ["Làm thay đỗi hoặc phá hủy trực tiếp dữ liệu trên hệ thống.", "Chỉ lén lút nghe trộm và thu thập thông tin mà không làm thay đổi dữ liệu.", "Gây ra hiện tượng từ chối dịch vụ.", "Luôn kích hoạt các cảnh báo trên hệ thống IDS."], "answer": 1}, {"id": "006", "text": "Hình thức tấn công nào nhằm mục đích làm cạn kiệt tài nguyên hệ thống, khiến dịch vụ ngừng hoạt động?", "opts": ["Phishing", "SQL Injection", "DDoS", "Man-in-the-Middle"], "answer": 2}, {"id": "007", "text": "Kỹ thuật tấn công 'Phishing' thường sử dụng phương thức chủ yếu nào?", "opts": ["Gửi thông điệp giả mạo các tổ chức uy tín để lừa người dùng cung cấp thông tin.", "Chèn mã độc vào cơ sở dữ liệu.", "Bẻ khóa mật khẩu bằng phương pháp Brute Force.", "Quét các cổng đang mở trên máy chủ."], "answer": 0}, {"id": "008", "text": "Mô hình kiến trúc an ninh mạng nào hoạt động theo nguyên tắc 'Không bao giờ tin tưởng, luôn luôn xác minh'?", "opts": ["Perimeter Security", "Zero Trust", "Defense in Depth", "SSO Security"], "answer": 1}, {"id": "009", "text": "SOC trong lĩnh vực an toàn thông tin là viết tắt của từ gì?", "opts": ["System Operations Control", "Security Operations Center", "Secure Object Configuration", "Standard Operations Checklist"], "answer": 1}, {"id": "010", "text": "Lỗ hồng SOL Injection xảy ra chủ yếu do nguyên nhân nào?", "opts": ["Không lọc dữ liệu đầu vào và nồối chuỗi trực tiếp vào câu lệnh SQL.", "Sử dụng cơ chế PreparedStatement.", "Mã hóa mật khẩu yếu.", "Không cấu hình Firewall."], "answer": 0}, {"id": "011", "text": "Đề phòng chóồng SQL Injection ở mức mã nguồn một cách triệt để nhất, lập trình viên nên sử dụng kỹ thuật nào?", "opts": ["Statement kết hợp nối chuỗi ký tự.", "PreparedStatement (Parameterized Queries).", "Mã hóa MD5 cho toàn bộ dữ liệu.", "Kiểm tra dữ liệu bằng JavaScript ở Client."], "answer": 1}, {"id": "012", "text": "Tấn công XSS (Cross-Site Scripting) được định nghĩa là gì?", "opts": ["Chèn mã SQL độc hại vào cơ sở dữ liệu.", "Chèn các đoạn mã kịch bản (JavaScript) độc hại đề thực thi trên trình duyệt của người dùng.", "Can thiệp trực tiếp vào bộ nhớ RAM của Server.", "Tấn công từ chối dịch vụ nhằm vào công 80."], "answer": 1}, {"id": "013", "text": "Lỗ hồng Stored XSS nguy hiểm hơn Reflected XSS ở điểm nào?", "opts": ["Mã độc được lưu vĩnh viễn vào CSDL và tự động tấn công mọi người dùng truy cập trang.", "Nó có thể đánh cắp mật khẩu máy chủ.", "Nó thực thi mã bằng ngôn ngữ C++ thay vì JavaScript.", "Nó bỏ qua được mọi loại Tường lửa phần cứng."], "answer": 0}, {"id": "014", "text": "Chính sách bảo mật Same-Origin Policy (SOP) quy định các trang web chỉ được chia sẻ dữ liệu với nhau nếu có cùng yếu tố nào?", "opts": ["Giao thức, Tên miền và Địa chỉ IP.", "Giao thức, Tên miền và Cổng kết nối (Port).", "Tên miền, Trình duyệt và Cổng kết nối.", "Hệ điều hành, Giao thức và Tên miền."], "answer": 1}, {"id": "015", "text": "Lỗ hồng CSREF (Cross-Site Request Forgery) có cơ chế hoạt động như thế nào?", "opts": ["Ép trình duyệt của nạn nhân tải mã độc về máy.", "Lợi dụng phiên đăng nhập hợp lệ của nạn nhân để gửi các yêu cầu HTTP trái phép đến máy chủ.", "Can thiệp vào giao thức HTTPS để lấy cắp gói tin.", "Đánh cắp Cookie bằng mã JavaScript độc hại."], "answer": 1}, {"id": "016", "text": "Giải pháp hiệu quả nhất để phòng chống tấn công CSREF trên ứng dụng Web là gì?", "opts": ["Mã hóa mật khẩu người dùng.", "Sử dụng Anti-CSRF Token duy nhất cho mỗi biểu mẫu (Form).", "Chặn hoàn toàn mã JavaScript chạy trên trình duyệt.", "Chỉ sử dụng phương thức HTTP GET cho mọi yêu cầu."], "answer": 1}, {"id": "017", "text": "Công cụ nào sau đây đóng vai trò là Intercepting Proxy phổ biến để kiểm thử lỗ hồng Web?", "opts": ["Nmap", "Wireshark", "Burp Suite / OWASP ZAP", "Metasploit"], "answer": 2}, {"id": "018", "text": "Cơ chế 'Data Masking' trong cơ sở dữ liệu nhằm mục đích gì?", "opts": ["Mã hóa toàn bộ đĩa cứng lưu trữ.", "Che giấu dữ liệu nhạy cảm (như thay số thẻ thành XXXX) khi hiền thị cho người dùng không có thẩm quyền.", "Ngụy trang máy chủ CSDL dưới một địa chỉ IP giả.", "Xóa vĩnh viễn dữ liệu cũ."], "answer": 1}, {"id": "019", "text": "Nguyên tắc 'Separation of Duties' (Phân tách nhiệm vụ) trong CSDL có ý nghĩa gì?", "opts": ["Giao toàn quyền cho một người quản trị duy nhất.", "Chia nhỏ vai trò để tránh một cá nhân có toàn quyền thực hiện một chuỗi hành động nhạy cảm.", "Chia CSDL thành các bảng nhỏ không liên kết.", "Không cho phép bất kỳ ai truy cập CSDL vào ban đêm."], "answer": 1}, {"id": "020", "text": "Trong mô hình AAA bảo mật dữ liệu, 'Accounting' đảm nhận vai trò gì?", "opts": ["Xác thực danh tính người dùng.", "Phân quyền truy cập các bảng dữ liệu.", "Ghi nhật ký (Auditing) và giám sát mọi thao tác trên hệ thống.", "Đảm bảo tính sẵn sàng của hệ thống."], "answer": 2}, {"id": "021", "text": "Đề bảo mật API theo hướng phi trạng thái (Stateless), chuẩn Token nào thường được sử dụng phổ biến nhất hiện nay?", "opts": ["Basic Authentication", "Session Cookie", "JWT (JSON Web Token)", "NTLM"], "answer": 2}, {"id": "022", "text": "Phần 'Signature' trong cấu trúc của một chuỗi JWT dùng để làm gì?", "opts": ["Đảm bảo tính toàn vẹn, xác minh Token không bị giả mạo hay thay đổi.", "Nén dung lượng của Token.", "Mã hóa nội dung để người dùng không đọc được payload.", "Quy định thời gian sống của Token."], "answer": 0}, {"id": "023", "text": "Kỹ thuật bảo vệ bộ nhớ ASLR trên hệ điều hành hoạt động theo nguyên lý nào?", "opts": ["Chặn các tiền trình không có chữ ký số khởi chạy.", "Xáo trộn ngẫu nhiên vị trí các vùng dữ liệu trong bộ nhớ để chặn tấn công tràn bộ đệm.", "Cấm thực thi mã trên toàn bộ không gian RAM.", "Khóa địa chỉ IP của kẻ tấn công ngay lập tức."], "answer": 1}, {"id": "024", "text": "Tính năng DEP (Data Execution Prevention) của hệ điều hành nhằm mục đích gì?", "opts": ["Đánh dấu một số vùng bộ nhớ là 'không được thực thi' để chặn mã độc chạy từ vùng đệm dữ liệu.", "Mã hóa toàn bộ các file văn bản trên đĩa cứng.", "Chặn tải các file exe từ mạng Internet.", "Tự động khôi phục dữ liệu bị xóa."], "answer": 0}, {"id": "025", "text": "Chip bảo mật TPM (Trusted Platform Module) trên mainboard cung cấp chức năng chính là gì?", "opts": ["Tăng tốc độ xử lý đồ họa cho hệ điều hành.", "Lưu trữ khóa mã hóa an toàn ở mức phần cứng và hỗ trợ Secure Boot.", "Cung cấp kết nối mạng VPN phần cứng.", "Ngăn chặn tấn công DDoS vào hệ thống."], "answer": 1}, {"id": "026", "text": "Malware nào có khả năng tự nhân bản và phát tán độc lập qua mạng mà không cần file vật chủ?", "opts": ["Virus", "Worm", "Trojan", "Spyware"], "answer": 1}, {"id": "027", "text": "Trojan Horse trong an ninh mạng có đặc tính lây nhiễm như thế nào?", "opts": ["Tự động lây lan qua các công mạng đang mở.", "Ngụy trang dưới vỏ bọc một phần mềm hợp pháp, hữu ích để lừa người dùng tải về cài đặt.", "Chỉ lây nhiễm qua các file tài liệu VWOord macro.", "Chặn hoàn toàn kết nối Internet của máy nạn nhân."], "answer": 1}, {"id": "028", "text": "Kỹ thuật 'Polymorphism' (Biến hình) giúp mã độc đạt được mục đích gì?", "opts": ["Tự động thay đổi mã để tạo chữ ký khác nhau sau mỗi lần lây nhiễm nhằm qua mặt phần mềm diệt virus.", "Chuyễn từ Virus thành Ransomware trong tích tắc.", "Ngăn chặn người dùng gỡ cài đặt mã độc.", "Tăng tốc độ gửi dữ liệu lắy cắp ra bên ngoài."], "answer": 0}, {"id": "029", "text": "Mục đích chính của hệ thống Firewall trong hạ tầng mạng là gì?", "opts": ["Mã hóa toàn bộ dữ liệu đi qua mạng LAN.", "Kiểm soát và lọc lưu lượng mạng ra/vào hệ thống dựa trên các bộ quy tắc (Rules) được cấu hình trước.", "Phát hiện mã độc đa hình đang ẩn náu trong RAM.", "Cung cấp kết nối Wi-Fi miễn phí cho người dùng doanh nghiệp."], "answer": 1}, {"id": "030", "text": "Điểm khác biệt cốt lõi giữa IDS (Intrusion Detection System) và IPS (Intrusion Prevention System) là gì?", "opts": ["IDS dùng cho máy chủ Web, IPS dùng cho máy chủ Database.", "IDS chỉ phát hiện và cảnh báo hành vi bất thường, còn IPS có khả năng chủ động can thiệp và ngăn chặn cuộc tấn công.", "IDS là phần cứng, IPS là phần mềm.", "IDS mã hóa đường truyền còn IPS chỉ phân tích log."], "answer": 1}, {"id": "031", "text": "Công nghệ VPN (Virtual Private Network) bảo vệ dữ liệu truyền tải qua Internet bằng cơ chế nào?", "opts": ["Chặn tất cả các gói tin đến từ địa chỉ IP nước ngoài.", "Tạo một đường hầm mã hóa (Encrypted Tunnel) từ điểm cuối tới điểm cuối.", "Quét virus mọi file trước khi gửi đi.", "Tự động đổi mật khẩu đăng nhập mạng liên tục."], "answer": 1}, {"id": "032", "text": "Thuật ngữ 'Shift-left Security' trong quy trình phát triển phần mềm an toàn (SSDLC) có nghĩa là gì?", "opts": ["Giao toàn bộ công việc kiểm thử cho đội vận hành.", "Chỉ kiểm tra lỗi ở giao diện phía bên trái ứng dụng.", "Tích hợp các hoạt động kiểm thử bảo mật vào càng sớm càng tốt, ngay từ những khâu đầu tiên của quy trình phát triển.", "Thực hiện bảo mật sau khi sản phẩm đã được triển khai (Deploy)."], "answer": 2}, {"id": "033", "text": "Trong mô hình DevSecOps, bảo mật được nhìn nhận như thế nào?", "opts": ["Là trách nhiệm duy nhất của đội ngũ An ninh mạng (Security Team).", "Là trách nhiệm chung của toàn bộ đội ngũ, được tự động hóa xuyên suốt chuỗi GCI/CD.", "Là bước kiểm tra cuối cùng bắt buộc trước khi phát hành sản phẩm.", "Là quy trình thủ công chỉ áp dụng cho mã nguồn Java."], "answer": 1}, {"id": "034", "text": "Phương pháp kiểm thử tĩnh SAST (Static Application Security Testing) có đặc tính nào?", "opts": ["Tấn công giả lập vào ứng dụng khi ứng dụng đang chạy ở môi trường thực tế.", "Phân tích và quét mã nguồn (Source Code) để tìm lỗi bảo mật mà không cần thực thi chương trình.", "Chỉ giám sát lưu lượng mạng đi qua tường lửa.", "Phân tích hành vi của người dùng trên ứng dụng Wepb."], "answer": 1}, {"id": "035", "text": "Phương pháp kiểm thử động DAST (Dynamic Application Security Testing) thường được mô tả là kiểu kiểm thử nào?", "opts": ["Kiểm thử hộp trắng (White-box testing).", "Kiểm thử tĩnh qua phân tích mã nguồn.", "Kiểm thử hộp đen (Black-box testing) trên ứng dụng đang chạy (Runtime).", "Kiểm tra phiên bản của các thư viện bên thứ ba."], "answer": 2}, {"id": "036", "text": "Công cụ phân tích cầấu phần phần mềm SCA (Software Composition Analysis) được sử dụng đề làm gì trong SSDLC?", "opts": ["Phát hiện các lỗ hồng đã biết trong các thư viện phụ thuộc mã nguồn mở (Open Source Dependencies) được tích hợp vào ứng dụng.", "Quét cỗng (Port scanning) trên máy chủ Production.", "Mã hóa mật khẩu CSDL.", "Chồng lại các cuộc tấn công từ chối dịch vụ."], "answer": 0}, {"id": "037", "text": "Kỹ thuật tấn công 'Blind SQL Injection' đòi hỏi hacker phải làm gì để trích xuất dữ liệu?", "opts": ["Đọc trực tiếp nội dung CSDL in trên màn hình trang web.", "Chờ đợi hệ thống gửi email chứa dữ liệu vồ máy của hacker.", "Hỏi các câu hỏi logic Đúng/Sai (Boolean) hoặc dựa vào độ trễ thời gian (Time-based) của máy chủ.", "Khởi động lại máy chủ ứng dụng."], "answer": 2}, {"id": "038", "text": "Tính năng 'Secure Cookie' trên trình duyệt giúp bảo vệ Cookie khỏi rủi ro nào?", "opts": ["Ngăn chặn việc gửi Cookie qua các kết nối HTTP không được mã hóa (chỉ gửi qua HTTPS).", "Ngăn chặn XSS đọc Cookie thông qua thuộc tính HttpOnly.", "Mã hóa giá trị Cookie bằng thuật toán AES-256.", "Vô hiệu hóa việc tạo Cookie mới trên trình duyệt."], "answer": 0}, {"id": "039", "text": "Tính năng 'HttpOnly' được thiết lập cho Cookie có tác dụng bảo mật gì?", "opts": ["Ngăn chặn các truy vấn SQL Injection.", "Chỉ cho phép kết nối qua giao thức HTTPS.", "Ngăn chặn mã JavaScript ở phía Client (bao gồm cả mã độc XSS) truy cập và đọc được nội dung của Cookie.", "Ngăn chặn tấn công CSRF tự động gửi Form."], "answer": 2}, {"id": "040", "text": "WAF (Web Application Firewall) khác với Network Firewall thông thường ở điểm nào?", "opts": ["WAF chuyên phân tích lưu lượng ở tằng ứng dụng (Lớp 7 - HTTP/HTTPS) để chặn các cuộc tấn công như SQLi, XSS.", "WAF hoạt động ở tằng giao vận (Lớp 4) để chặn IP và Port.", "WAF không thể giải mã các kết nối HTTPS.", "WAF chỉ có thể được cài đặt dưới dạng thiết bị phần cứng."], "answer": 0}, {"id": "041", "text": "Hậu quả nghiêm trọng nhất của việc cầu hình hệ thống sai (Security Misconfiguration) là gì?", "opts": ["Giao diện trang web hiển thị sai màu sắc.", "Làm lộ các thư mục ẩn, file cầu hình hoặc cấp quyền truy cập trái phép cho kẻ tấn công bên ngoài.", "Tăng tốc độ truy xuất dữ liệu một cách bất thường.", "Tự động khởi động lại dịch vụ định kỳ."], "answer": 1}, {"id": "042", "text": "Ransomware (Mã độc tống tiền) có hành vi phá hoại điền hình nào?", "opts": ["Xóa sạch toàn bộ hệ điều hành ngay khi lây nhiễm.", "Lén lút sử dụng CPU của nạn nhân để đào tiền ảo.", "Mã hóa toàn bộ dữ liệu quan trọng của nạn nhân và yêu cầu trả tiền chuộc để lắy khóa giải mã.", "Tự động gửi email chứa quảng cáo rác đến danh bạ nạn nhân."], "answer": 2}, {"id": "043", "text": "Kỹ thuật 'Obfuscation' (Làm mờ mã) thường được tin tặc sử dụng với mục đích gì?", "opts": ["Làm cho mã độc chạy nhanh hơn.", "Làm cho cấu trúc mã nguồn trở nên rồi rắm, khó đọc, gây khó khăn cho việc phân tích và dịch ngược (Reverse Engineering).", "Tăng kích thước file mã độc để tránh bị phát hiện.", "Vô hiệu hóa kết nối mạng của hệ thống."], "answer": 1}, {"id": "044", "text": "Thuật ngữ 'Zero-day Exploit' ám chỉ loại mã khai thác nào?", "opts": ["Khai thác dựa trên mật khẩu mặc định (000000).", "Khai thác lỗ hồng bảo mật chưa từng được công bố và nhà sản xuất phần mềm chưa có bản vá (Patch).", "Khai thác lỗ hồng đã được vá cách đây nhiều năm nhưng người dùng chưa cập nhật.", "Tấn công làm sập hệ thống trong 0 ngày."], "answer": 1}, {"id": "045", "text": "Rootkit là một dạng phần mềm độc hại có chức năng chuyên biệt gì?", "opts": ["Mã hóa đĩa cứng và đòi tiền chuộc.", "Theo dõi thao tác bàn phím (Keylogger).", "Can thiệp sâu vào nhân hệ điều hành (Kernel) để che giấu sự tồn tại của các mã độc khác hoặc các tiền trình trái phép.", "Hiển thị các bảng quảng cáo Pop-up liên tục."], "answer": 2}, {"id": "046", "text": "Khi quản trị viên phát hiện hệ thống máy chủ vừa bị xâm nhập, hành động ưu tiên đầu tiên cần làm theo quy trình ứng phó là gì?", "opts": ["Lập tức tắt nguồn máy chủ bằng cách rút phích cắm.", "Xóa toàn bộ log hệ thống để dọn dẹp.", "Cô lập (Isolate) hệ thống bị nhiễm khỏi mạng nội bộ để ngăn chặn lây lan nhưng vẫn duy trì trạng thái để điều tra.", "Format lại toàn bộ ổ đĩa cứng và cài lại từ đầu."], "answer": 2}, {"id": "047", "text": "Kiến trúc DMZ (Demilitarized Zone) trong thiết ké mạng có tác dụng gì?", "opts": ["Là khu vực chứa các máy chủ nội bộ cực kỳ quan trọng, cách ly hoàn toàn với Internet.", "Là một phân mạng trung gian chứa các dịch vụ công khai (Web, Mail, DNS) đối mặt với Internet, giúp tách biệt và bảo vệ mạng nội bộ.", "Là mạng WiFi dành riêng cho khách truy cập.", "Là trung tâm điều hành SOC."], "answer": 1}, {"id": "048", "text": "Khái niệm 'Social Engineering' trong các cuộc tấn công mạng nhắm vào yếu tố nào?", "opts": ["Lỗ hồng mã nguồn C++.", "Thuật toán băm SHA-256.", "Sự chủ quan, thiếu hiểu biết và lòng tin của con người.", "Tính năng định tuyến của thiết bị Router."], "answer": 2}, {"id": "049", "text": "Quy trình CI/CD trong phát triển phần mềm là viết tắt của từ gì?", "opts": ["Continuous Integration / Continuous Deployment (Tích hợp liên tục / Triển khai liên tục)", "Code Inspection / Code Deployment", "Continuous Inspection / Constant Delivery", "Controlled Integration / Continuous Development"], "answer": 0}, {"id": "050", "text": "Botnet (Mạng máy tính ma) thường được tin tặc sử dụng nhiều nhất cho mục đích tấn công nào?", "opts": ["SQL Injection", "Tắn công từ chối dịch vụ phân tán (DDoS)", "Man-in-the-Middle", "Cross-Site Scripting (XSS)"], "answer": 1}, {"id": "051", "text": "Hình thức tấn công 'Spear Phishing' khác với 'Phishing' truyền thống ở điểm nào?", "opts": ["Sử dụng mã độc tồng tiền thay vì đánh cắp mật khẩu.", "Phân tán quy mô lớn hàng triệu email ngẫu nhiên.", "Nhắm mục tiêu cụ thể vào một cá nhân hoặc tổ chức sau khi đã thu thập thông tin chỉ tiết về họ.", "Chỉ thực hiện được qua mạng nội bộ LAN."], "answer": 2}, {"id": "052", "text": "Tấn công Man-in-the-Middle (MITM) là gì?", "opts": ["Kẻ tấn công đánh sập máy chủ trung gian.", "Kẻ tấn công bí mật chen ngang vào giữa luồng giao tiếp của hai bên để nghe lén hoặc sửa đổi dữ liệu.", "Tấn công trực tiếp vào cơ sở dữ liệu của ứng dụng.", "Phát tán mã độc qua một thiết bị USB trung gian."], "answer": 1}, {"id": "053", "text": "Hệ thống SIEM (Security Information and Event Management) có chức năng chính là gì?", "opts": ["Ngăn chặn các cuộc tấn công DDoS vào hệ thống Wep.", "Thu thập, lưu trữ, phân tích log và sự kiện bảo mật từ nhiều nguồn đề phát hiện mối đe dọa.", "Mã hóa toàn bộ cơ sở dữ liệu của doanh nghiệp.", "Tự động vá lỗi hệ điều hành."], "answer": 1}, {"id": "054", "text": "Tấn công 'Brute Force' vào chức năng đăng nhập hoạt động theo nguyên lý nào?", "opts": ["Thử nghiệm ngẫu nhiên hoặc tuần tự tất cả các tổ hợp ký tự có thể đề tìm ra mật khẩu đúng.", "Sử dụng một đoạn mã SQL để bypass màn hình đăng nhập.", "Đánh cắp cookie phiên làm việc của người dùng.", "Chèn mã JavaScript độc hại vào tên đăng nhập."], "answer": 0}, {"id": "055", "text": "Tấn công 'Dictionary Attack' tối ưu hơn Brute Force thông thường ở điểm nào?", "opts": ["Nó bỏ qua bước kiểm tra mật khẩu.", "Chỉ thử các mật khẩu có ý nghĩa, các từ thông dụng từ một danh sách (từ điển) được biên soạn sẵn.", "Nó đánh sập máy chủ nhanh hơn.", "Nó có thể giải mã được thuật toán băm SHA-2586."], "answer": 1}, {"id": "056", "text": "Lỗ hồng Broken Authentication thường xuất hiện khi hệ thống bỏ qua việc nào sau đây?", "opts": ["Sử dụng WAF chặn IP lạ.", "Quản lý phiên làm việc kém an toàn, cho phép mật khẩu yếu, thiếu giới hạn só lằn đăng nhập sai.", "Lọc các ký tự nháy đơn () trong input.", "Sử dụng chứng chỉ HTTPS/SSL."], "answer": 1}, {"id": "057", "text": "Lỗ hồng IDOR (Insecure Direct Object References) xảy ra khi nào?", "opts": ["Hệ thống hiển thị trực tiếp cấu trúc thư mục của máy chủ.", "Ứng dụng cho phép người dùng truy cập dữ liệu của người khác bằng cách thay đổi giá trị tham số định danh (như id=1 thành id=2) mà không kiểm tra quyền.", "Mã hóa sai đối tượng dữ liệu trong bộ nhớ.", "Cho phép upload file chứa mã độc lên hệ thống."], "answer": 1}, {"id": "058", "text": "DOM-based XSS khác biệt với Stored XSS và Reflected XSS ở điểm nào?", "opts": ["Mã độc được thực thi ở máy chủ Backend.", "Mã độc lây nhiễm thông qua file đính kèm email.", "Lỗ hỗng tồn tại hoàn toàn trong quá trình xử lý mã JavaScript của trình duyệt phía Client (DOM), gói tin HTTP không nhất thiết chứa mã độc.", "Chỉ nhắm vào người dùng có quyền Quản trị viên (Admin)."], "answer": 2}, {"id": "059", "text": "Content Security Policy (CSP) là cơ chế bảo mật dùng để phòng chống chủ yếu loại tấn công nào?", "opts": ["SQL Injection", "DDoS", "Cross-Site Scripting (XSS)", "Local File Inclusion"], "answer": 2}, {"id": "060", "text": "CORS (Cross-Origin Resource Sharing) được sử dụng nhằm mục đích gì?", "opts": ["Chặn toàn bộ các yêu cầu HTTP ngoại lai.", "Cho phép một trang web gửi yêu cầu truy cập tài nguyên tới một tên miền khác một cách an toàn và có kiểm soát.", "Mã hóa dữ liệu liên miền.", "Đồng bộ hóa dữ liệu giữa các máy chủ."], "answer": 1}, {"id": "061", "text": "Nguy cơ lớn nhất của lỗ hồổng File Upload không an toàn là gì?", "opts": ["Máy chủ bị cạn kiệt dung lượng đĩa cứng.", "Kẻ tấn công tải lên file mã độc (Web Shell), sau đó thực thi để chiếm toàn quyền kiểm soát máy chủ Web.", "Ứng dụng bị chậm do phải xử lý ảnh độ phân giải cao.", "Thay đồi giao diện của ứng dụng web."], "answer": 1}, {"id": "062", "text": "Kỹ thuật Directory Traversal (Path Traversal) nhằm mục đích gì?", "opts": ["Xóa toàn bộ thư mục web.", "Đọc các file nhạy cảm bên ngoài thư mục gốc của ứng dụng (ví dụ: ../..!..Jetcipasswd).", "Tải các file giao diện về máy cá nhân.", "Đồi tên thư mục trên máy chủ."], "answer": 1}, {"id": "063", "text": "Tấn công Session Hijacking (Đánh cắp phiên) thường lợi dụng điều kiện nào?", "opts": ["Kẻ tấn công biết được Session ID hợp lệ của người dùng qua XSS hoặc bắt gói tin.", "Mật khẩu của người dùng quá yếu.", "Máy chủ không kiểm tra mã CAPTCHA.", "Ứng dụng bị lỗi SQL Injection."], "answer": 0}, {"id": "064", "text": "Trong bảo mật CSDL, kỹ thuật Tokenization (Mã hóa thay thế) hoạt động như thế nào?", "opts": ["Xóa hoàn toàn dữ liệu nhạy cảm khỏi hệ thống.", "Thay thế dữ liệu nhạy cảm (như só thẻ tín dụng) bằng một chuỗi ký tự vô nghĩa (Token), dữ liệu thật được cất ở hầm chứa an toàn.", "Dùng hàm băm một chiều để băm dữ liệu.", "Mã hóa dữ liệu bằng thuật toán RSA."], "answer": 1}, {"id": "065", "text": "KMS (Key Management Service) trong hạ tằng đám mây có vai trò gì?", "opts": ["Lọc các gói tin mạng độc hại.", "Quản lý tập trung vòng đời, tạo và lưu trữ an toàn các khóa mã hóa bảo vệ cơ sở dữ liệu.", "Phát hiện mã độc Ransomware.", "Tự động phân quyền truy cập cho nhân viên."], "answer": 1}, {"id": "066", "text": "Thành phần nào đóng vai trò như một 'chốt chặn' tập trung để xử lý xác thực, giới hạn lưu lượng (rate limiting) cho các API của hệ thống?", "opts": ["Web Server", "Database Server", "API Gateway", "Load Balancer"], "answer": 2}, {"id": "067", "text": "Kỹ thuật 'Rate Limiting' trong bảo mật API nhằm ngăn chặn loại tấn công nào hiệu quả nhất?", "opts": ["SOQL Injection", "Brute Force, DDoS và lạm dụng tài nguyên", "Cross-Site Scripting (XSS)", "Man-in-the-Middle"], "answer": 1}, {"id": "068", "text": "OAuth 2.0 là một tiêu chuẩn giao thức được sử dụng chủ yếu cho mục đích gì?", "opts": ["Truyền tải file mã hóa an toàn.", "Ủy quyền truy cập (Authorization) an toàn mà không cần chia sẻ mật khẩu góc.", "Mã hóa kênh truyền mạng vật lý.", "Phát hiện mã độc trong hệ thống Wepb."], "answer": 1}, {"id": "069", "text": "Sự khác biệt cốt lõi giữa Authentication (Xác thực) và Authorization (Phân quyền) là gì?", "opts": ["Authentication kiểm tra 'Bạn là aiï?', Authorization kiểm tra 'Bạn được phép làm gì?'.", "Authentication kiểm tra quyền truy cập thư mục, Authorization kiểm tra mật khẩu.", "Cả hai đều cùng một ý nghĩa, chỉ khác tên gọi.", "Authentication bảo vệ CSDL, Authorization bảo vệ giao diện Web."], "answer": 0}, {"id": "070", "text": "Lỗ hồng BOLA (Broken Object Level Authorization) trong API thường dẫn đến hậu quả gì?", "opts": ["Server API bị ngưng hoạt động.", "Kẻ tấn công có thể truy cập, sửa đỗổi hoặc xóa tài nguyên của người dùng khác bằng cách thao tác ID trên URL API.", "API trả về thông báo lỗi dạng mã HTML.", "Tắt cả các token bị vô hiệu hóa."], "answer": 1}, {"id": "071", "text": "Vì sao quá trình cập nhật bản vá (Patch Management) cho Hệ điều hành lại vô cùng quan trọng?", "opts": ["Giúp giao diện hệ điều hành đẹp hơn.", "Khắc phục các lỗ hồng đã biết, ngăn chặn hacker khai thác để chiếm quyền điều khiển hệ thống.", "Tăng dung lượng ỗ đĩa tự động.", "Giảm nhiệt độ hoạt động của CPU."], "answer": 1}, {"id": "072", "text": "Tính năng bảo vệ CFG (Control Flow Guard) trên Windows có tác dụng gì?", "opts": ["Ngăn chặn các luồng thực thi mã không hợp lệ, giảm thiểu các cuộc tấn công khai thác lỗi hỏng bộ nhớ.", "Kiểm soát lưu lượng Internet giống Firewall.", "Giới hạn thời gian sử dụng máy tính của người dùng.", "Chặn quảng cáo trên trình duyệt Edge."], "answer": 0}, {"id": "073", "text": "Nguyên tắc 'Security by Design' yêu cầu điều gì trong quá trình phát triển ứng dụng?", "opts": ["Thiết kế giao diện người dùng có màu sắc cảnh báo rủi ro.", "Bảo mật phải được tích hợp vào mọi bước của chu kỳ phát triển ngay từ giai đoạn thiết kế kiến trúc ban đầu.", "Bảo mật chỉ dành riêng cho kiến trúc sựư phần mềm thiết kế.", "Mua các phần mồềm bảo mật đắt tiền về tích hợp sau khi ra mắt."], "answer": 1}, {"id": "074", "text": "Cuộc tấn công APT (Advanced Persistent Threat) có đặc điểm nổi bật nào?", "opts": ["Tấn công ồ ạt, gây sập hệ thống trong vài giây rồi rút lui.", "Cuộc tấn công mục tiêu, tinh vi, diễn ra lén lút, duy trì sự tồn tại trong hệ thống thời gian dài để ăn cắp dữ liệu.", "Chỉ lây nhiễm qua USB.", "Chỉ do những hacker nghiệp dư thực hiện."], "answer": 1}, {"id": "075", "text": "Thuật ngữ 'Payload' trong thành phần của một đoạn mã khai thác (Exploit) nghĩa là gì?", "opts": ["Công cụ dùng để quét lỗ hồng mạng.", "Gói dữ liệu hoặc mã lệnh độc hại sẽ được thực thi trôn máy nạn nhân sau khi khai thác thành công.", "Kích thước của file mã độc.", "Địa chỉ IP của kẻ tấn công."], "answer": 1}, {"id": "076", "text": "Spyware là phần mềm độc hại có hành vi chính là gì?", "opts": ["Mã hóa ồ đĩa và đòi tiền.", "Bí mật thu thập thông tin, lịch sử duyệt web, thói quen của người dùng và gửi về cho kẻ tấn công.", "Mở cồng Backdoor cho hacker.", "Hiển thị quảng cáo liên tục trên trình duyệt."], "answer": 1}, {"id": "077", "text": "Keylogger thuộc nhóm mã độc nào sau đây dựa trên chức năng?", "opts": ["Ransomware", "Spyware / Information Stealer", "Adware", "Worm"], "answer": 1}, {"id": "078", "text": "Kỹ thuật 'Metamorphism' của Malware nguy hiểm hơn 'Polymorphism' ở điểm nào?", "opts": ["Metamorphism tự động viết lại hoàn toàn logic cấu trúc mã nguồn của nó ở mỗi lằn lây nhiễm, khiến việc phát hiện cực kỳ khó khăn.", "Nó chỉ thay đổi khóa giải mã ở vỏ bọc bên ngoài.", "Nó xóa toàn bộ ồ đĩa mà không cần kích hoạt.", "Nó giả mạo địa chỉ MAC của thiết bị."], "answer": 0}, {"id": "079", "text": "Stateful Firewall (Tường lửa trạng thái) ưu việt hơn Stateless Firewall (Tường lửa phi trạng thái) nhờ khả năng nào?", "opts": ["Xử lý tốc độ mạng Gigabit.", "Theo dõi và ghi nhớ trạng thái của toàn bộ phiên kết nối từ lúc mở đến lúc đóng, ngăn chặn các gói tin giả mạo thuộc về một kết nối không tồn tại.", "Chỉ kiểm tra đơn lẻ từng gói tin độc lập.", "Ngăn chặn được 100% mã độc Zero-day."], "answer": 1}, {"id": "080", "text": "Tường lửa thế hệ mới NGFW (Next-Generation Firewall) thường được tích hợp thêm các chức năng nào so với Firewall truyền thống?", "opts": ["Nhận diện người dùng cá nhân (Identity-awareness), hệ thống phòng chống xâm nhập (IPS), và kiểm soát tận lớp Ứng dụng (Application Control).", "Chỉ có tính năng lọc địa chỉ IP và Port.", "Chỉ thêm tính năng tăng tốc độ truyền tải nội dung tĩnh.", "Lưu trữ sao lưu CSDL SQL."], "answer": 0}, {"id": "081", "text": "Cơ chế phát hiện IDS dựa trên 'Signature-based' (Dựa trên chữ ký) hoạt động như thế nào?", "opts": ["Sử dụng AI để phán đoán lưu lượng độc hại.", "So sánh mẫu dữ liệu mạng thu được với cơ sở dữ liệu các mẫu mã độc/tấn công đã biết.", "Đo lường băng thông sử dụng của hệ thống.", "Chỉ phân tích lưu lượng HTTPS đã mã hóa."], "answer": 1}, {"id": "082", "text": "Cơ chế phát hiện IDS dựa trên 'Anomaly-based' (Dựa trên hành vi/bất thường) có ưu điểm lớn nhất là gì?", "opts": ["Hoạt động cực kỳ nhanh, tiêu tồn ít tài nguyên.", "Không bao giờ sinh ra cảnh báo giả (False Positive).", "Có khả năng phát hiện ra các cuộc tấn công Zero-day mới chưa từng có trong cơ sở dữ liệu.", "Tự động vá lỗi hệ điều hành."], "answer": 2}, {"id": "083", "text": "Giao thức IPsec thường được sử dụng trong giải pháp bảo mật nào để mã hóa ở tằng Network?", "opts": ["Cơ sở dữ liệu", "Firewall ứng dụng Web", "Mạng riêng ảo (VPN)", "Hệ thống IDS"], "answer": 2}, {"id": "084", "text": "Khác biệt giữa IPsec VPN và SSL/TLS VPN là gì?", "opts": ["IPsec chạy trên trình duyệt web, SSL cần cài đặt phần mềm Client phức tạp.", "IPsec cung cấp kết nối mạng (Network-level), còn SSL/TLS VPN thường dễ dàng truy cập linh hoạt qua trình duyệt Web (Application-level).", "SSL VPN an toàn hơn IPsec VPN gấp 10 làn.", "IPsec VPN không hỗ trợ mã hóa."], "answer": 1}, {"id": "085", "text": "Hệ thống 'Honeypot' trong kiến trúc phòng thủ mạng được thiết lập nhằm mục đích gì?", "opts": ["Tăng tốc độ truy cập Internet cho nhân viên.", "Là một hệ thống giả mạo được thiết kế có tình có lỗ hỏng để đánh lừa, bẫy hacker tấn công nhằm thu thập thông tin và chiến thuật của chúng.", "Lọc các email rác.", "Chặn người dùng truy cập web đen."], "answer": 1}, {"id": "086", "text": "Trong quy trình Cl/CD an toàn, bước 'SCA (Software Composition Analysis)' thường được tự động hóa đ làm gì?", "opts": ["Kiểm tra lỗi cú pháp của ngôn ngữ lập trình.", "Phát hiện các lỗ hổng (CVE) có sẵn trong các thư viện Open Source mà dự án đang sử dụng.", "Biên dịch mã muồn thành file thực thi.", "Đẩy code lên môi trường Production."], "answer": 1}, {"id": "087", "text": "Kỹ thuật 'Secret Scanning' trong DevSecOps được sinh ra để ngăn ngừa rủi ro nào?", "opts": ["Lập trình viên vô tình commit các khóa API (API Keys), mật khẩu, token lên kho lưu trữ mã nguồn (ví dụ: GitHub, GitLab).", "Lập trình viên sử dụng phần mềm bẻ khóa.", "Ngăn chặn tấn công DDoS vào hệ thống Git.", "Kiểm tra mã độc tống tiền trong máy cá nhân."], "answer": 0}, {"id": "088", "text": "Trong bảo mật Container (ví dụ Docker/Kubernetes) như được nhắc tới trong bài 8, giải pháp an toàn nào được khuyến nghị?", "opts": ["Chạy tắt cả các Container bằng quyền Root để đảm bảo tương thích tối đa.", "Thực hiện Image Scanning để tìm lỗ hồng trước khi triển khai và áp dụng Least Privilege (Không chạy với quyền root).", "Tắt hoàn toàn Tường lửa để Container giao tiếp nhanh hơn.", "Cài đặt phầằn mềm Antivirus cá nhân vào từng Container."], "answer": 1}, {"id": "089", "text": "Bảo mật trong DevOps truyền thống thường xảy ra ở giai đoạn nào?", "opts": ["Thường được xử lý ở cuối vòng đời, chỉ kiểm tra trước khi Release gây chậm trễ tiền độ.", "Tích hợp liên tục vào từng dòng code.", "Chỉ xử lý lúc thiết kế hệ thống ban đầu.", "Hoàn toàn bị bỏ qua."], "answer": 0}, {"id": "090", "text": "Sự xuất hiện của 'Web Shell' trên máy chủ chứng tỏ điều gì?", "opts": ["Quản trị viên vừa cài đặt giao diện điều khiển mới.", "Hệ thống có thể đã bị xâm nhập thông qua lỗ hồng tải file hoặc RCE, hacker đã đặt một công cụ để điều khiển máy chủ từ xa qua giao diện web.", "Server đang thực hiện backup dữ liệu.", "Cơ sở dữ liệu đang nâng cấp."], "answer": 1}, {"id": "091", "text": "Cấu hình phân quyền nào trên hệ điều hành Linux giúp ngăn chặn các tiền trình trái phép sửa đồi file hệ thống quan trọng?", "opts": ["Cấp quyền 777 cho mọi thư mục.", "Loại bỏ quyền Write (w) của người dùng thông thường đối với các thư mục như /etc và /bin.", "Cho phép mọi user sử dụng lệnh sudo mà không cần mật khẩu.", "Ấn các file hệ thống đi."], "answer": 1}, {"id": "092", "text": "Giải pháp nào là hiệu quả nhất để chồống lại rủi ro bị bẻ khóa mật khẩu thông qua tấn công Brute Force?", "opts": ["Chỉ sử dụng chữ thường để gõ nhanh hơn.", "Áp dụng xác thực đa yếu tố (MFA) kết hợp với chính sách khóa tài khoản (Account Lockout) sau nhiều lần thử sai.", "Lưu trữ mật khẩu dạng Plaintext.", "Khởi động lại máy chủ mỗi ngày."], "answer": 1}, {"id": "093", "text": "Logic Flaw (Lỗ hồng Logic) trong ứng dụng web có thể bị phát hiện dễ dàng nhất qua công cụ nào?", "opts": ["Trình quét lỗ hồng tự động (Scanner) luôn tìm ra 100%.", "Firewall tự động chặn.", "Thường rất khó phát hiện tự động, yêu cầu kiểm thử viên bảo mật phải rà soát thủ công luồng nghiệp vụ của ứng dụng.", "Antivirus cài trên máy Server."], "answer": 2}, {"id": "094", "text": "Khái niệm 'Attack Surface' (Bề mặt tấn công) trong bảo mật hệ thống được hiều là gì?", "opts": ["Giao diện trang chủ của Website.", "Tổng số điểm (endpoints), giao diện, API, cồng mạng... có thể bị lợi dụng để xâm nhập vào hệ thống.", "Mức độ thiệt hại đo bằng tiền.", "Số lượng máy tính bị nhiễm virus trong mạng."], "answer": 1}, {"id": "095", "text": "Một trong những phương pháp giảm thiềểu 'Attack Surface' hiệu quả là gì?", "opts": ["Mở toàn bộ cồng mạng dự phòng.", "Gỡ bỏ các dịch vụ, phần mềm không cần thiết, vô hiệu hóa các API hoặc giao thức cũ (như Telnet, FTP).", "Tăng số lượng tài khoản quản trị viên lên.", "Sử dụng nhiều hệ quản trị CSDL cùng lúc."], "answer": 1}, {"id": "096", "text": "Kỹ thuật 'Sanitization' đồi với dữ liệu đầu vào có nghĩa là gì?", "opts": ["Chặn hoàn toàn bất kỳ ai có địa chỉ IP lạ tải dữ liệu lên.", "Làm sạch dữ liệu, loại bỏ hoặc mã hóa các ký tự đặc biệt có khả năng thực thi mã độc trước khi hệ thống xử lý (như xóa thẻ <script>).", "Mã hóa MD5 cho toàn bộ dữ liệu người dùng nhập.", "Nén dữ liệu người dùng thành file Zip."], "answer": 1}, {"id": "097", "text": "Tại sao việc thiết kế hệ thống theo mô hình 'Microservices' (Dịch vụ vi mô) có lợi cho bảo mật DevSecOps?", "opts": ["Vì nó làm cho hệ thống chạy chậm hơn, Hacker nản chí.", "Phân tách rõ ràng trách nhiệm, hạn chế bán kính ảnh hưởng (Blast Radius) nếu một dịch vụ nhỏ bị tấn công, các dịch vụ khác vẫn an toàn.", "Không cần sử dụng API Gateway nữa.", "Loại bỏ hoàn toàn lỗ hồng SQL Injection."], "answer": 1}, {"id": "098", "text": "Khái niệm 'Insider Threat' (Mối đe dọa nội bộ) đề cập đến nhóm đối tượng nào?", "opts": ["Nhóm tin tặc hoạt động ngoài lãnh thổ.", "Mã độc xâm nhập sâu vào Kernel của hệ điều hành.", "Nhân viên cũ/hiện tại, nhà thầu hoặc đối tác đã có quyền truy cập hợp pháp vào hệ thống, nhưng có ý hoặc vô ý gây rò rỉ dữ liệu.", "Các công cụ tự động dò quét mật khẩu từ Internet."], "answer": 2}, {"id": "099", "text": "Giao thức nào cung cấp cơ chế bảo mật (mã hóa và toàn vẹn dữ liệu) cho lớp Giao vận (Transport Layer) trên Internet hiện nay?", "opts": ["HTTP", "TLS/SSL (Tạo nên HTTPS)", "FTP", "Telnet"], "answer": 1}, {"id": "100", "text": "Chức năng 'Logging & Monitoring' liên tục trong bảo mật hệ thống giúp đạt được điều kiện gì theo mô hình CIA?", "opts": ["Bảo mật tuyệt đối (100% Confidentiality).", "Giúp phát hiện sớm các dị thường, phục vụ truy vết điều tra (Accounting) để duy trì sự Toàn vẹn (Integrity) và Sẵn sàng (Availability).", "Ngăn chặn mọi cuộc tấn công Phishing.", "Tự động đổi mật khẩu CSDL."], "answer": 1}, {"id": "101", "text": "Trong quy trình phát triển phần mềm an toàn (SSDLC), kỹ thuật 'Threat Modeling' (Mô hình hóa mối đe dọa) thường được thực hiện ở giai đoạn nào là tốt nhất?", "opts": ["Giai đoạn Triển khai (Deployment)", "Giai đoạn Thiết kế kiến trúc (Design)", "Giai đoạn Vận hành (Operations)", "Giai đoạn Xóa bỏ hệ thống"], "answer": 1}, {"id": "102", "text": "Mục đích chính của \"Threat Modeling là gì?", "opts": ["Dự đoán và xác định các mồi đe dọa tiềm ẩn để thiết kế các biện pháp giảm nhẹ trước khi viết code.", "Quét mã nguồn để tìm lỗi cú pháp.", "Mã hóa cơ sở dữ liệu khách hàng.", "Kiểm tra tóc độ tải trang web."], "answer": 0}, {"id": "103", "text": "Hình thức tấn công 'Whaling' là một biến thể của Phishing, nhưng có đặc điểm gì khác biệt?", "opts": ["Sử dụng mạng xã hội để phát tán tin nhắn rác.", "Chỉ nhắm mục tiêu vào các nhân vật cấp cao trong tổ chức (như CEO, CFO).", "Sử dụng mã độc tồng tiền thay vì đánh cắp mật khẩu.", "Tấn công qua mạng WiFi công cộng."], "answer": 1}, {"id": "104", "text": "Trong mật mã học, hàm băm (Hash Function) được sử dụng chủ yếu để đảm bảo yếu tố nào trong mô hình CIA?", "opts": ["Tính bảo mật (Confidentiality)", "Tính toàn vẹn (Integrity)", "Tính sẵn sàng (Availability)", "Tính n danh"], "answer": 1}, {"id": "105", "text": "Đề bảo vệ mật khẩu người dùng lưu trong cơ sở dữ liệu an toàn nhất, phương pháp nào sau đây được khuyến nghị?", "opts": ["Lưu dưới dạng văn bản rõ (Plaintext).", "Mã hóa bằng thuật toán đối xứng AES.", "Sử dụng hàm băm (như Bcrypt, Argon2) kết hợp với chuỗi Salt ngẫu nhiên.", "Sử dụng hàm băm MD5 không có Salt."], "answer": 2}, {"id": "106", "text": "Chuỗi 'Salt' trong quá trình băm mật khẩu có tác dụng gì?", "opts": ["Làm cho mật khẩu dễ nhớ hơn.", "Ngăn chặn tấn công bằng bảng tra cứu băm (Rainbow Tables) do tạo ra các mã băm khác nhau cho cùng một mật khẩu.", "Giúp nén kích thước mật khẩu.", "Giúp khôi phục lại mật khẩu gốc khi người dùng quên."], "answer": 1}, {"id": "107", "text": "Sự khác biệt giữa mã hóa đối xứng (Symmetric) và bắt đối xứng (Asymmetric) là gì?", "opts": ["Mã hóa đối xứng dùng chung một khóa để mã hóa và giải mã; bắt đối xứng dùng cặp khóa (Public/Private key).", "Mã hóa đối xứng chậm hơn bắt đối xứng rất nhiều.", "Mã hóa bắt đối xứng không thể giải mã được.", "Mã hóa đối xứng chỉ dùng cho dữ liệu văn bản."], "answer": 0}, {"id": "108", "text": "Giao thức SSL/TLS sử dụng phương pháp mã hóa nào để tối ưu hóa giữa bảo mật và hiệu suất?", "opts": ["Chỉ sử dụng mã hóa đối xứng.", "Chỉ sử dụng mã hóa bất đối xứng.", "Dùng mã hóa bất đối xứng để trao đổi khóa ban đầu, sau đó dùng khóa đối xứng đề truyền dữ liệu.", "Không sử dụng mã hóa, chỉ dùng chữ ký số."], "answer": 2}, {"id": "109", "text": "Xác thực đa yếu tố (MFA - Multi-Factor Authentication) yêu cầu người dùng cung cấp tối thiều hai yếu tố khác loại. Mã OTP gửi qua SMS thuộc loại yếu tố nào?", "opts": ["Something you know (Thứ bạn biết - VD: Mật khẩu)", "Something you have (Thứ bạn có - VD: Điện thoại nhận SMS)", "Something you are (Thứ thuộc về bạn - VD: Sinh trắc học)", "Somewhere you are (Nơi bạn ở - VD: Vị trí GPS)"], "answer": 1}, {"id": "110", "text": "Trong hệ thống IDS/IPS, cảnh báo giả (False Positive) nghĩa là gì?", "opts": ["Hệ thống bỏ lọt một cuộc tấn công thực sự.", "Hệ thống cảnh báo có tấn công nhưng thực chất đó là lưu lượng mạng hợp lệ của người dùng bình thường.", "Hệ thống bị sập do quá tải.", "Hệ thống chặn thành công một mã độc."], "answer": 1}, {"id": "111", "text": "Ngược lại, hiện tượng bỏ lọt (False Negative) trong hệ thống an ninh mạng có nghĩa là gì?", "opts": ["Cảnh báo sai lưu lượng bình thường.", "Cuộc tấn công thực sự xảy ra nhưng hệ thống không phát hiện và không đưa ra cảnh báo nào.", "Mật khẩu bị sai nhiều làn.", "Hệ thống tự động ngắt kết nối Internet."], "answer": 1}, {"id": "112", "text": "Kỹ thuật 'Baiting' trong Social Engineering là gì?", "opts": ["Gọi điện thoại mạo danh nhân viên IT.", "Có tình bỏ lại các USB chứa mã độc ở nơi công cộng (như bãi xe) để nạn nhân tò mò nhặt về cắm vào máy tính.", "Đi theo người khác qua cồổng an ninh mà không cần quẹt thẻ (Tailgating).", "Đục thùng rác để tìm tài liệu nhạy cảm (Dumpster diving)."], "answer": 1}, {"id": "113", "text": "Khi thiết kế ứng dụng cho phép người dùng tải lên hình ảnh (File Upload), biện pháp kiểm tra nào là chưa đủ an toàn và dễ bị qua mặt nhất?", "opts": ["Chỉ kiểm tra phần đuôi mở rộng của file ở phía giao diện Client (JavaScript).", "Kiểm tra MIME type ở phía Backend.", "Kiểm tra Magic Bytes ở đầu file.", "Quét virus file bằng công cụ tích hợp trước khi lưu trữ."], "answer": 0}, {"id": "114", "text": "Một ứng dụng web hiển thị URL như sau: `http://example.com/download?file=report.pdf. Lỗ hồng nào có khả năng cao nhất tồn tại nếu lập trình viên không lọc tham số `file`?", "opts": ["SQL Injection", "Directory Traversal (LFI - Local File Inclusion)", "Cross-Site Scripting (XSS)", "CSRF"], "answer": 1}, {"id": "115", "text": "Mô hình \"Trách nhiệm chung' (Shared Responsibility Model) trong bảo mật Điện toán đám mây quy định điều gì?", "opts": ["Nhà cung cấp Cloud chịu 100% trách nhiệm về bảo mật.", "Người dùng chịu 100% trách nhiệm về bảo mật.", "Nhà cung cấp bảo vệ hạ tằng vật lý và nền tảng; Khách hàng chịu trách nhiệm bảo mật dữ liệu, ứng dụng và cấu hình của họ trên đám mây.", "Công ty bảo hiểm sẽ đền bù mọi rủi ro."], "answer": 2}, {"id": "116", "text": "Chứng chỉ số (Digital Certificate) dựa trên chuẩn X.509 được cấp phát bởi tổ chức nào?", "opts": ["Tổ chức chứng thực (CA - Certificate Authority)", "Nhà cung cấp dịch vụ mạng (ISP)", "Tổ chức Y tế thế giới (WHO)", "Bộ Thông tin và Truyền thông"], "answer": 0}, {"id": "117", "text": "Mô hình Cyber Kill Chain (Chuỗi tiêu diệt mạng) do Lockheed Martin đề xuất mô tả điều gì?", "opts": ["Cách thức viết phần mềm an toàn.", "Các giai đoạn tuần tự mà kẻ tấn công thường thực hiện để xâm nhập và đánh cắp dữ liệu, từ thăm dò đến hành động cuối cùng.", "Cấu trúc mạng của doanh nghiệp.", "Sự phân quyền trong cơ sở dữ liệu."], "answer": 1}, {"id": "118", "text": "Trong Cyber Kill Chain, giai đoạn 'Reconnaissance' (Thăm dò) tin tặc thường làm gì?", "opts": ["Gửi mã độc vào email.", "Thu thập thông tin tình báo về mục tiêu (như email nhân viên, cấu trúc mạng, loại máy chủ) từ các nguồn mở (OSINT).", "Cài đặt Rootkit vào hệ thống.", "Rút dữ liệu ra ngoài (Exfiltration)."], "answer": 1}, {"id": "119", "text": "Lỗ hồng SSRF (Server-Side Request Forgery) có mức độ nguy hiểm như thế nào?", "opts": ["Ép trình duyệt người dùng gửi request.", "Lừa máy chủ Web gửi một yêu cầu mạng tới một hệ thống nội bộ khác mà thông thường không được phép truy cập từ Internet.", "Làm thay đổi giao diện ứng dụng web.", "Xóa cookie phiên làm việc."], "answer": 1}, {"id": "120", "text": "Bảo mật ứng dụng (AppSec) hiện đại không chỉ phụ thuộc vào VWAF mà còn cần RASP (Runtime Application Self-Protection). Tính năng của RASP là gì?", "opts": ["Hoạt động như một Firewall cứng trước mạng.", "Được gắn trực tiếp vào trong môi trường thực thi của ứng dụng, giúp ứng dụng tự giám sát và chặn hành vi độc hại từ bên trong khi đang chạy.", "Quét mã nguồn tĩnh.", "Quản lý mật khẩu người dùng."], "answer": 1}, {"id": "121", "text": "Khái niệm 'Vulnerability Management' (Quản lý lỗ hồng) là một quy trình như thế nào?", "opts": ["Là một hoạt động chỉ làm một lằn khi mua máy chủ mới.", "Là một chu trình liên tục bao gồm quét định kỳ, phân loại rủi ro, vá lỗi và xác nhận lại.", "Là quá trình viết mã độc giả lập.", "Là quy trình khởi động lại tường lửa."], "answer": 1}, {"id": "122", "text": "Trong báo cáo kiểm thử bảo mật (Penetration Testing), lỗ hồng 'Critical' (Nghiêm trọng) có nghĩa là gì?", "opts": ["Lỗi cần sự tương tác phức tạp của người dùng mới có thể khai thác.", "Lỗ hồng có thể bị khai thác dễ dàng, trực tiếp từ xa và gây hậu quả thảm khốc (chiếm quyền máy chủ, lộ toàn bộ CSDL).", "Lỗi thiết kế giao diện không đẹp.", "Lỗi cấu hình tiêu chuẩn."], "answer": 1}, {"id": "123", "text": "Phương pháp 'Fuzzing' (Kiểm thử mờ) trong bảo mật ứng dụng hoạt động như thế nào?", "opts": ["Gửi các dữ liệu rác, ngẫu nhiên, không hợp lệ hoặc quá khổ vào ứng dụng với khối lượng lớn để xem ứng dụng có bị crash hoặc sinh lỗi bất thường hay không.", "Đọc từng dòng mã nguồn để tìm lỗi logic.", "Mã hóa đường truyền bằng giao thức SSL.", "Sử dụng AI để tối ưu hóa code."], "answer": 0}, {"id": "124", "text": "Đề bảo mật dữ liệu lưu trữ (Data at Rest) trên máy chủ cơ sở dữ liệu, giải pháp nào là bắt buộc?", "opts": ["Mã hóa ỗ đĩa vật lý hoặc mã hóa cấp độ bảng/trường dữ liệu (TDE).", "Sử dụng cáp quang tốc độ cao.", "Sử dụng SSL/TLS.", "Ấn file dữ liệu."], "answer": 0}, {"id": "125", "text": "Thuật toán AES-256 có con số 256 thể hiện điều gì?", "opts": ["Thời gian giải mã là 256 giây.", "Độ dài của khóa mã hóa là 256 bit.", "Thuật toán chia dữ liệu thành 256 khối.", "Số người có thể dùng chung khóa."], "answer": 1}, {"id": "126", "text": "Rủi ro chính của việc sử dụng các thành phần bên thứ ba (Third-party Components) đã cũ trong ứng dụng là gì?", "opts": ["Làm giao diện kém tương thích với mobile.", "Các thành phần này có thể chứa các lỗ hồng đã được công bồ rộng rãi (CVE), khiến ứng dụng trở thành mục tiêu dễ dàng của các mã khai thác có sẵn.", "Làm tăng dung lượng RAM.", "Vi phạm bản quyền hình ảnh."], "answer": 1}, {"id": "127", "text": "Giải pháp 'Disaster Recovery Plan' (Kế hoạch phục hồi sau thảm họa) nhằm giải quyết mục tiêu nào trong CIA?", "opts": ["Tính bảo mật (Confidentiality)", "Tính toàn vẹn (Integrity)", "Tính sẵn sàng (Availability)", "Tính xác thực"], "answer": 2}, {"id": "128", "text": "Backup dữ liệu tuân theo quy tắc 3-2-1 được hiểu như thế nào?", "opts": ["Lưu 3 bản copy, vào 2 giờ sáng, bằng 1 phần mềm.", "Có 3 bản sao dữ liệu, lưu trên 2 loại phương tiện lưu trữ khác nhau, với 1 bản sao được lưu ở địa điểm ngoài (Off-site/Cloud).", "Có 3 kỹ sư quản lý, 2 máy chủ dự phòng, 1 đường mạng.", "Sao lưu 3 làn trong 2 tháng cho 1 dự án."], "answer": 1}, {"id": "129", "text": "Tấn công 'XML External Entity' (XXE) xảy ra ở đâu?", "opts": ["Trong bộ nhớ RAM của Server.", "Trong quá trình bộ phân tích cú pháp (Parser) của ứng dụng xử lý file XML có chứa các tham chiếu thực thể mở rộng độc hại.", "Trên các định dạng file ảnh JPEG.", "Trong giao thức mạng TCP."], "answer": 1}, {"id": "130", "text": "Trong bảo mật mạng, khái niệm 'MAC Spoofing' là hành vi gì?", "opts": ["Tắn công máy tính chạy hệ điều hành macOS.", "Giả mạo địa chỉ vật lý (MAC Address) của một thiết bị mạng hợp pháp để qua mặt hệ thống kiểm soát truy cập (như mạng WiFi doanh nghiệp).", "Ngắt cáp mạng vật lý.", "Làm nhiễu sóng Bluetooth."], "answer": 1}, {"id": "131", "text": "Tại sao việc 'Hardcode' (Viết cứng) mật khẩu hoặc API Key trực tiếp vào mã nguồn lại bị coi là thực hành lập trình tòi (Bad Practice)?", "opts": ["Vì nó làm cho mã nguồn chạy chậm hơn.", "Vì mã nguồn có thể bị rò rỉ hoặc dịch ngược (Reverse engineering), dẫn đến việc lộ mật khẩu một cách dễ dàng.", "Vì trình biên dịch không hỗ trợ.", "Vì nó làm tăng dung lượng file exe."], "answer": 1}, {"id": "132", "text": "Biện pháp thay thế tốt nhất cho việc Hardcode mật khẩu vào mã nguồn là gì?", "opts": ["Sử dụng biến môi trường (Environment Variables) hoặc các hệ thống quản lý Secret chuyên dụng (như HashiCorp Vault, AWS Secrets Manager).", "Viết mật khẩu ra một file text lưu trên desktop máy chủ.", "Ghi nhớ trong đầu và nhập bằng tay mỗi lằn chạy ứng dụng.", "Sử dụng mật khẩu mặc định của framework."], "answer": 0}, {"id": "133", "text": "Theo báo cáo của OWASP Top 10, 'Broken Access Control' (Lỗi kiểm soát truy cập) là gì?", "opts": ["Người dùng quên mật khẩu.", "Người dùng có thể thực hiện các hành động ngoài quyền hạn thiết kế của họ (ví dụ: người dùng thường xem được trang Admin).", "Hệ thống bị cúp điện.", "Firewall chặn nhằm người dùng hợp pháp."], "answer": 1}, {"id": "134", "text": "Kỹ thuật phân tích rủi ro định lượng (Quantitative Risk Analysis) khác với định tính (Qualitative) ở điểm nào?", "opts": ["Định lượng chỉ dùng cho công ty nhỏ.", "Định lượng sử dụng các giá trị tài chính và xác suất bằng số liệu thống kê cụ thể (ví dụ: thiệt hại 100.000, xác suất 5%): định tính dùng mức độ (Cao, Trung bình, Thấp).", "Định lượng làm mắt thời gian hơn và không chính xác bằng.", "Định lượng không đánh giá hệ thống mạng."], "answer": 1}, {"id": "135", "text": "Tấn công 'DNS Spoofing' (Giả mạo DNS) có tác động gì đến người dùng?", "opts": ["Làm người dùng không thể truy cập bất kỳ trang web nào.", "Chuyển hướng (Redirect) người dùng từ một tên miền hợp pháp sang một địa chỉ IP chứa trang web giả mạo do hacker kiểm soát.", "Xóa toàn bộ bộ nhớ Cache của trình duyệt.", "Đồổi mật khẩu WiFi của người dùng."], "answer": 1}, {"id": "136", "text": "Khái niệm 'Sandboxing' trong bảo mật hệ điều hành là gì?", "opts": ["Lưu trữ dữ liệu ra ỗ cứng ngoài.", "Một cơ chế cô lập an toàn, trong đó các chương trình hoặc mã không tin cậy được thực thi trong một môi trường bị hạn chế nghiêm ngặt, không thể ảnh hưởng đến hệ thống chính.", "Phần mềm dọn rác hệ thống.", "Giao diện dòng lệnh của Linux."], "answer": 1}, {"id": "137", "text": "Tại sao việc dùng mật khẩu có độ dài lớn (ví dụ: Passphrase trên 15 ký tự) lại an toàn hơn là mật khẩu ngắn chứa ký tự đặc biệt?", "opts": ["Vì các hệ thống không cho phép nhập ký tự đặc biệt.", "Vì độ dài làm tăng theo cấp số nhân không gian toán học của các trường hợp vét cạn (Brute Force), khiến thời gian bẻ khóa trở nên bất khả thi so với mật khẩu ngắn.", "Vì mật khẩu dài dễ nhớ hơn.", "Vì các công cụ hacker không gõ được chữ cái thường."], "answer": 1}, {"id": "138", "text": "Chức năng của 'Jump Server' (Máy chủ nhảy/Bastion Host) trong quản trị mạng là gì?", "opts": ["Máy chủ đóng vai trò như router mạng LAN.", "Là một máy chủ duy nhất có độ bảo mật cực cao, được dùng làm điểm kiểm soát trung gian để quản trị viên truy cập vào các hệ thống nhạy cảm bên trong mạng nội bộ.", "Máy chủ chuyên dùng để chơi game.", "Máy chủ tự động nhảy IP để tránh bị tấn công."], "answer": 1}, {"id": "139", "text": "Một nhân viên IT rời công ty nhưng tài khoản mạng của người đó không bị khóa ngay lập tức. Đây là lỗ hồng thuộc quy trình nào?", "opts": ["Quy trình vá lỗi (Patch Management).", "Quy trình cấp/thu hồi quyền truy cập (Identity and Access Management / Offboarding).", "Quy trình mã hóa dữ liệu.", "Quy trình bảo trì phần cứng."], "answer": 1}, {"id": "140", "text": "Giao thức SSH (Secure Shell) thường dùng cổng mặc định nào để quản trị máy chủ từ xa một cách an toàn?", "opts": ["Port 80", "Port443", "Port22", "Port21"], "answer": 2}, {"id": "141", "text": "Để ngăn chặn tấn công từ chối dịch vụ (DoS) vào ứng dụng Web, kỹ thuật cầu hình nào trên Web Server là cần thiết?", "opts": ["Mở rộng kích thước file Upload tối đa.", "Thiết lập Timeout (Thời gian chờ) hợp lý và giới hạn kích thước Request Header/Body.", "Cho phép chạy Script với quyền Root.", "Hiến thị thông báo lỗi chỉ tiết ra màn hình."], "answer": 1}, {"id": "142", "text": "Tắn công 'Cryptojacking' có nghĩa là gì?", "opts": ["Bẻ khóa các thuật toán mật mã của hệ thống.", "Cài mã độc lén lút sử dụng tài nguyên CPU/GPU của nạn nhân đễ đào tiền điện tử cho hacker.", "Mã hóa dữ liệu và tống tiền bằng Bitcoin.", "Đánh cắp ví điện tử lạnh."], "answer": 1}, {"id": "143", "text": "Khi nhận được một email yêu cầu đổi mật khẩu ngân hàng kèm theo đường link, cách hành xử an toàn nhất là gì?", "opts": ["Click ngay vào link và đổi mật khẩu để bảo đảm an toàn.", "Bỏ qua email, tự gõ địa chỉ trang web chính thức của ngân hàng vào trình duyệt để kiểm tra.", "Chuyễn tiếp email cho bạn bè hỏi ý kiến.", "Nhắn tin phản hồi lại email đó."], "answer": 1}, {"id": "144", "text": "Lỗ hồng bảo mật dạng 'Business Logic' (Lỗ hồng nghiệp vụ) khác biệt ở điểm nào?", "opts": ["Liên quan đến lỗi phần cứng mạng.", "Không xuất phát từ lỗi cú pháp hay mã hóa, mà do sự sai sót trong thiết kế quy trình nghiệp vụ (ví dụ: thanh toán đơn hàng với số lượng âm).", "Chỉ xảy ra ở các doanh nghiệp lớn.", "Do dùng chung mật khẩu."], "answer": 1}, {"id": "145", "text": "Một chính sách bảo mật tốt trong doanh nghiệp phải đảm bảo được yếu tố nào?", "opts": ["Được phỗ biến và yêu cầu tuân thủ bởi tất cả mọi người, kể cả ban lãnh đạo.", "Chỉ bộ phận IT mới cần biết.", "Khóa mọi kết nối Internet ra bên ngoài.", "Chỉ áp dụng khi có sự cố xảy ra."], "answer": 0}, {"id": "146", "text": "Khái niệm '\"Red Team' trong an toàn thông tin đóng vai trò gì?", "opts": ["Đội ngũ chuyên lo về pháp lý doanh nghiệp.", "Đội ngũ đóng giả làm tin tặc thực sự, tiền hành các cuộc tắần công toàn diện để kiểm tra khả năng phòng thủ và phản ứng của tổ chức.", "Đội ngũ bảo trì phần cứng.", "Đội ngũ lập trình giao diện Web."], "answer": 1}, {"id": "147", "text": "Khái niệm 'Blue Team' đối lập với 'Red Team' đảm nhận nhiệm vụ gì?", "opts": ["Thiết kế các chiến dịch quảng cáo.", "Là đội ngũ phòng thủ nội bộ, chịu trách nhiệm thiết lập các biện pháp an ninh, giám sát mạng và ngăn chặn các cuộc tấn công.", "Viết mã độc để thử nghiệm hệ thống.", "Kiểm toán tài chính của công ty."], "answer": 1}, {"id": "148", "text": "Trong bối cảnh bảo mật ứng dụng hiện tại, tại sao việc chỉ mã hóa (Encryption) là chưa đủ mà còn cần băm (Hashing) và chữ ký số (Digital Signature)?", "opts": ["Vì mã hóa quá chậm.", "Mã hóa chỉ bảo vệ tính bí mật (Confidentiality). Băm và chữ ký số bổ sung tính toàn vẹn (Integrity) và chống chối bỏ (Non-repudiation).", "Vì hacker đã giải mã được tất cả các thuật toán.", "Vì mã hóa không hoạt động trên thiết bị di động."], "answer": 1}, {"id": "149", "text": "Hành động nào sau đây là nguyên tắc tốt nhất (Best Practice) khi xây dựng các thông báo lỗi (Error Messages) cho ứng dụng?", "opts": ["Hiển thị toàn bộ câu truy vấn SQL lỗi để lập trình viên dễ fix bug.", "Hiển thị thông báo chung chung cho người dùng (vd: 'Đã có lỗi xảy ra, vui lòng thử lại'), và ghi lại lỗi chỉ tiết vào file log an toàn phía máy chủ.", "Hiền thị chỉ tiết phiên bản hệ điều hành và Framework đang dùng.", "Bỏ qua các lỗi và cho ứng dụng chạy tiếp bình thường."], "answer": 1}, {"id": "150", "text": "Môn học 'Bảo mật Ứng dụng và Hệ thống' nhấn mạnh thông điệp cốt lõi nào cho sinh viên/kỹ sư tương lai?", "opts": ["Bảo mật chỉ là việc cài đặt các phần mềm đắt tiền.", "Bảo mật không bao giờ là một điểm đến tuyệt đối, mà là một quy trình liên tục đòi hỏi sự cảnh giác, nguyên tắc cốt lõi (Security by Design) và cập nhật không ngừng.", "Sau khi tốt nghiệp, chỉ cần quan tâm viết code cho ứng dụng chạy là đủ.", "Bảo mật hệ thống là trách nhiệm duy nhất của đội ngũ Ops."], "answer": 1}]; else statement2; if (condition 2) statement 3;", "opts": ["1", "3", "4", "2"], "answer": 3}, {"id": "042", "group": "5", "diff": "Trung Bình", "text": "Cho đồ thị luồng điều khiển như sau  Với giá trị nào của n đường điều khiển: [hinh]", "opts": ["-> 2(T) -> 3 -> 4 là không thể đạt được? 1  0", "1", "2", "3"], "answer": 0}, {"id": "045", "group": "5", "diff": "Trung Bình", "text": "Ví dụ về xem xét bao phủ trong đoạn mã nguồn sau đây là một ví dụ về: if (condition1 && (condition2 || function1())) statement1; else statement2;", "opts": ["Bao phủ các câu lệnh", "Bao phủ các điều kiện", "Bao phủ các mệnh đề", "Bao phủ các đường"], "answer": 1}, {"id": "050", "group": "5", "diff": "Trung Bình", "text": "Cần ít nhất bao nhiêu ca kiểm thử để đảm bảo 100% bao phủ nhánh? if (x>y) x=x+1; else y=y+1; while (x>y) {y=x*y; x=x+1;}", "opts": ["1", "2", "3", "4"], "answer": 1}, {"id": "053", "group": "5", "diff": "Trung Bình", "text": "Nếu một đầu vào có dải giá trị từ -10 đến 10, thì các giá trị biên cần kiểm tra là gì trong trường hợp cẩn thận?", "opts": ["-10 và 10.", "-11, -10, 9, và 10.", "-10, -9, 9, và 10.", "-11, -10, -9, 9, 10, và 11."], "answer": 3}, {"id": "054", "group": "5", "diff": "Trung Bình", "text": "Kiểm thử giá trị biên có thể được áp dụng cho loại dữ liệu nào sau đây?", "opts": ["Chỉ dữ liệu số nguyên", "Chỉ dữ liệu ký tự", "Cả dữ liệu số nguyên và ký tự", "Dữ liệu số thực"], "answer": 2}, {"id": "055", "group": "5", "diff": "Trung Bình", "text": "Đối với kiểm thử giá trị biên, tại sao các giá trị ngay bên ngoài giới hạn (ví dụ: -1 và 101 cho khoảng từ 0 đến 100) cũng được kiểm tra?", "opts": ["Để đảm bảo chương trình có thể xử lý các giá trị ngoài giới hạn một cách đúng đắn.", "Để kiểm tra hiệu suất của chương trình.", "Để đảm bảo giao diện người dùng hoạt động đúng.", "Để tối ưu hóa mã nguồn."], "answer": 0}, {"id": "056", "group": "5", "diff": "Trung Bình", "text": "Khi kiểm thử giá trị biên cho một trường hợp nhập liệu số nguyên có giới hạn từ", "opts": ["đến 10, giá trị nào sau đây không cần thiết phải kiểm tra?  1 0", "1", "50", "11"], "answer": 2}, {"id": "061", "group": "5", "diff": "Trung Bình", "text": "Số trường hợp kiểm thử giá trị biên với hàm n biến trong trường hợp cực kì xấu (robust worst-case) gần bằng:", "opts": ["7n", "7n", "5n", "5n"], "answer": 0}, {"id": "063", "group": "5", "diff": "Trung Bình", "text": "Khi thực hiện kiểm thử lớp tương đương cho một dải giá trị từ", "opts": ["đến 100, phân chia các lớp tương đương hợp lệ nào dưới đây có thể được tạo ra?  1  [1-20], (20-50], (50-100]", "[1-50], [50-90]", "[0-50], [51-70]", "[1-100], [101-200]"], "answer": 0}, {"id": "066", "group": "5", "diff": "Trung Bình", "text": "Trong kiểm thử lớp tương đương, giá trị đại diện của mỗi lớp được chọn như thế nào?", "opts": ["Giá trị biên của lớp.", "Giá trị trung bình của lớp.", "Bất kỳ giá trị nào trong lớp.", "Giá trị ngẫu nhiên ngoài lớp."], "answer": 2}, {"id": "067", "group": "5", "diff": "Trung Bình", "text": "Khi kiểm thử lớp tương đương hợp lệ cho một trường hợp nhập liệu số nguyên từ", "opts": ["đến 20, giá trị nào dưới đây có thể không cần kiểm tra?  1  0", "1", "5", "20"], "answer": 0}, {"id": "069", "group": "5", "diff": "Trung Bình", "text": "Để thực hiện kiểm thử đường đi cơ bản (Basic Path Testing), bước đầu tiên thường là gì?", "opts": ["Viết các trường hợp kiểm thử cho tất cả các giá trị biên.", "Phân tích và tạo đồ thị luồng điều khiển của chương trình.", "Xác định tất cả các lớp tương đương của dữ liệu.", "Tối ưu hóa mã nguồn để giảm độ phức tạp."], "answer": 1}, {"id": "072", "group": "5", "diff": "Trung Bình", "text": "Trong công thức tính độ phức tạp chu trình V(G) = E - N + 2P, ký hiệu N đại diện cho gì?", "opts": ["Số lượng đỉnh (nút) trong đồ thị.", "Số lượng cạnh trong đồ thị.", "Số lượng đường dẫn trong đồ thị.", "Số lượng chu trình trong đồ thị."], "answer": 0}, {"id": "073", "group": "5", "diff": "Trung Bình", "text": "Trong công thức tính độ phức tạp chu trình V(G) = E - N + 2P, ký hiệu E đại diện cho gì?", "opts": ["Số lượng đỉnh (nút) trong đồ thị.", "Số lượng cạnh trong đồ thị.", "Số lượng đường đi trong đồ thị.", "Số lượng chu trình trong đồ thị."], "answer": 1}, {"id": "078", "group": "5", "diff": "Trung Bình", "text": "Một bảng quyết định hoàn chỉnh và chính xác cần đảm bảo điều gì?", "opts": ["A. Tất cả các giá trị biên được kiểm tra.", "B. Tất cả các điều kiện và hành động tương ứng đều được liệt kê và kiểm tra.", "C. Tất cả các lớp tương đương của dữ liệu được xác định.", "D. Tất cả các yếu tố giao diện người dùng đều hoạt động đúng."], "answer": 1}, {"id": "082", "group": "5", "diff": "Trung Bình", "text": "Điều gì xảy ra nếu một điều kiện trong bảng quyết định không được đáp ứng?", "opts": ["Tất cả các hành động tương ứng sẽ được thực hiện.", "Không có hành động nào sẽ được thực hiện.", "Điều kiện đó sẽ được bỏ qua.", "Điều kiện đó sẽ được kiểm tra lại."], "answer": 1}, {"id": "085", "group": "5", "diff": "Trung Bình", "text": "Một bảng quyết định bao gồm các thành phần nào?", "opts": ["Các điều kiện và hành động.", "Các giá trị biên và lớp tương đương.", "Các đường đi và chu trình.", "Các nút và cạnh."], "answer": 0}, {"id": "090", "group": "5", "diff": "Trung Bình", "text": "Trong kiểm thử luồng dữ liệu, thuật ngữ \"Define-Use\" có nghĩa là gì?", "opts": ["Một biến được định nghĩa và sử dụng trong cùng một dòng mã.", "Một biến được xác định ở một điểm và được sử dụng ở một điểm khác.", "Một biến được định nghĩa nhưng không bao giờ được sử dụng.", "Một biến được sử dụng nhưng không bao giờ được định nghĩa."], "answer": 1}, {"id": "092", "group": "5", "diff": "Trung Bình", "text": "Khi nào thì kiểm thử luồng dữ liệu được coi là hoàn chỉnh?", "opts": ["Khi tất cả các giá trị biên được kiểm tra.", "Khi tất cả các biến trong chương trình đều được khai báo, gán giá trị và sử dụng một cách chính xác.", "Khi tất cả các lớp tương đương của dữ liệu được kiểm tra.", "Khi tất cả các yếu tố giao diện người dùng đều hoạt động đúng."], "answer": 1}, {"id": "094", "group": "5", "diff": "Trung Bình", "text": "Trong kiểm thử luồng dữ liệu, thuật ngữ \"DU Path\" đại diện cho gì?", "opts": ["Đường đi từ điểm khai báo đến điểm gán giá trị.", "Đường đi từ điểm gán giá trị đến điểm sử dụng.", "Đường đi từ điểm sử dụng đến atic testing và dynamic testing:", "opts": ["Static testing hiệu quả hơn dynamic testing", "Dynamic testing có liên quan đến việc chạy một số trường hợp thử nghiệm nên thường mất nhiều thời gian hơn so với static testing.", "Dynamic testing tìm thấy ít lỗi hơn so với static testing.", "Dynamic testing có thể được thực hiện trước khi biên dịch trong khi static testing chỉ có thể diễn ra sau khi biên dịch và liên kết."], "answer": 3}, {"id": "157", "group": "5", "diff": "Trung Bình", "text": "Các kiểu luồng dữ liệu bất thường (data flow anomaly ) là:", "opts": ["(D: Defined, U: Undefined, R: Reference)", "dd, dr, du", "dd, ur, du", "dr, ur, du"], "answer": 1}, {"id": "158", "group": "5", "diff": "Trung Bình", "text": "Câu nào sau đây không phải là Simple path?", "opts": ["2 – 3 – 4 – 5 – 6 – 7", "3 – 4 – 5 – 7 – 6 –", "3  3 – 5 – 6 –", "– 3 – 7 4 2 – 3 – 6 – 7 – 5 – 4"], "answer": 2}, {"id": "173", "group": "5", "diff": "Trung Bình", "text": "Trong kiểm thử giá trị biên nguyên tắc kiểm thử các dữ liệu vào không gồm loại nào dưới đây?", "opts": ["A. Giá trị nhỏ nhất", "B. Giá trị lớn nhất", "C. Giá trị bình thường", "D. Dữ liệu vào bao gồm cả 3 loại trên"], "answer": 3}, {"id": "181", "group": "5", "diff": "Trung Bình", "text": "Một tài liệu đặc tả chức năng cung cấp những gì?", "opts": ["Mô tả chi tiết các yêu cầu, các rủi ro có thể có.", "Các giao diện kết nối với các module khác của phần mềm, luồng dữ liệu.", "Dự toán xử lý lỗi, bộ nhớ sử dụng, hiệu năng và một số kĩ thuật giới hạn.", "Tất cả các đáp án đều đúng"], "answer": 3}, {"id": "199", "group": "5", "diff": "Trung Bình", "text": "một phần của chương trình: Tài liệu nào tóm tắt các hoạt động kiểm thử kết hợp với một hoặc nhiều đặc tả thiết kế kiểm thử?", "opts": ["Báo cáo sự cố kiểm thử", "Báo cáo tóm tắt kiểm thử", "Kiểm thử đăng nhập", "Kịch bản kiểm thử"], "answer": 0}, {"id": "204", "group": "5", "diff": "Trung Bình", "text": "Đo lường chất lượng từ góc nhìn user-view dễ dàng bằng cách nào?", "opts": ["Hỏi var TOTAL_QS = 150;


var quiz = [];
var answers = [];
var currentIdx = 0;
var phase = 'initial';
var wrongQuiz = [];
var wrongAnswers = [];
var wrongIdx = 0;

function shuffle(arr) {
  for (var i = arr.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = arr[i];
    arr[i] = arr[j];
    arr[j] = tmp;
  }
  return arr;
}

function pickQuestions() {
  var pool = ALL_QUESTIONS.slice();
  shuffle(pool);
  return pool.slice(0, TOTAL_QS);
}

function startQuiz() {
  phase = 'initial';
  quiz = pickQuestions();
  answers = [];
  for (var i = 0; i < quiz.length; i++) answers.push(-1);
  currentIdx = 0;
  document.getElementById('info').textContent = '150 cau hoi An toan thong tin';
  document.getElementById('startScreen').style.display = 'none';
  document.getElementById('resultScreen').style.display = 'none';
  document.getElementById('quizArea').style.display = 'block';
  renderDots();
  renderQ();
}

function renderDots() {
  var qList = phase === 'retry' ? wrongQuiz : quiz;
  var aList = phase === 'retry' ? wrongAnswers : answers;
  var idx = phase === 'retry' ? wrongIdx : currentIdx;
  var container = document.getElementById('qDots');
  container.innerHTML = '';
  for (var i = 0; i < qList.length; i++) {
    var dot = document.createElement('div');
    dot.className = 'dot' + (i === idx ? ' current' : '');
    if (aList[i] >= 0) dot.classList.add('answered');
    dot.textContent = i + 1;
    dot.onclick = (function(i2) { return function() { goToQ(i2); }; })(i);
    container.appendChild(dot);
  }
}

function updateDots() {
  var qList = phase === 'retry' ? wrongQuiz : quiz;
  var aList = phase === 'retry' ? wrongAnswers : answers;
  var idx = phase === 'retry' ? wrongIdx : currentIdx;
  var dots = document.querySelectorAll('.dot');
  for (var i = 0; i < dots.length; i++) {
    var dot = dots[i];
    dot.className = 'dot';
    if (i < qList.length) {
      if (aList[i] >= 0) dot.classList.add('answered');
      if (i === idx) dot.classList.add('current');
      dot.style.display = '';
    } else {
      dot.style.display = 'none';
    }
  }
}

function renderQ() {
  var isRetry = phase === 'retry';
  var qList = isRetry ? wrongQuiz : quiz;
  var aList = isRetry ? wrongAnswers : answers;
  var idx = isRetry ? wrongIdx : currentIdx;
  var q = qList[idx];
  if (!q) return;

  document.getElementById('qBadge').textContent = (isRetry ? 'Lam lai - ' : '') + 'Cau ' + q.id;
  
  document.getElementById('qText').textContent = q.text;
  
  document.getElementById('qCounter').textContent = (idx + 1) + ' / ' + qList.length;
  document.getElementById('progressFill').style.width = ((idx + 1) / qList.length * 100) + '%';

  var container = document.getElementById('options');
  container.innerHTML = '';

  var selected = aList[idx];
  for (var i = 0; i < q.opts.length; i++) {
    var btn = document.createElement('button');
    btn.className = 'opt';
    if (selected >= 0) {
      btn.classList.add('disabled');
      if (i === q.answer) btn.classList.add('correct');
      if (i === selected && i !== q.answer) btn.classList.add('wrong');
    } else {
      btn.onclick = (function(i2) { return function() { isRetry ? selectRetry(i2) : selectOpt(i2); }; })(i);
    }
    btn.textContent = (i + 1) + '. ' + q.opts[i];
    container.appendChild(btn);
  }

  document.getElementById('prevBtn').disabled = idx === 0;
  if (isRetry) {
    document.getElementById('nextBtn').textContent = idx === qList.length - 1 ? 'Xem tong ket ▶' : 'Sau ▶';
  } else {
    document.getElementById('nextBtn').textContent = idx === qList.length - 1 ? 'Xem ket qua ▶' : 'Sau ▶';
  }
  updateDots2(isRetry, idx);
}

function updateDots2(isRetry, idx) {
  var qList = isRetry ? wrongQuiz : quiz;
  var aList = isRetry ? wrongAnswers : answers;
  var dots = document.querySelectorAll('.dot');
  for (var i = 0; i < dots.length; i++) {
    var dot = dots[i];
    dot.className = 'dot';
    if (i < qList.length) {
      if (aList[i] >= 0) dot.classList.add('answered');
      if (i === idx) dot.classList.add('current');
    } else {
      dot.style.display = 'none';
    }
  }
  for (var i = qList.length; i < dots.length; i++) {
    dots[i].style.display = 'none';
  }
}

function selectOpt(i) {
  if (answers[currentIdx] >= 0) return;
  answers[currentIdx] = i;
  renderQ();
  var allDone = answers.every(function(a) { return a >= 0; });
  if (allDone) setTimeout(showResult, 600);
}

function selectRetry(i) {
  if (wrongAnswers[wrongIdx] >= 0) return;
  wrongAnswers[wrongIdx] = i;
  renderQ();
  var allDone = wrongAnswers.every(function(a) { return a >= 0; });
  if (allDone) setTimeout(showFinalSummary, 600);
}

function nextQ() {
  if (phase === 'retry') {
    if (wrongIdx < wrongQuiz.length - 1) {
      wrongIdx++;
      renderQ();
    } else {
      showFinalSummary();
    }
  } else {
    if (currentIdx < quiz.length - 1) {
      currentIdx++;
      renderQ();
    } else {
      showResult();
    }
  }
}

function prevQ() {
  if (phase === 'retry') {
    if (wrongIdx > 0) { wrongIdx--; renderQ(); }
  } else {
    if (currentIdx > 0) { currentIdx--; renderQ(); }
  }
}

function goToQ(i) {
  if (phase === 'retry') {
    if (i >= 0 && i < wrongQuiz.length) { wrongIdx = i; renderQ(); }
  } else {
    if (i >= 0 && i < quiz.length) { currentIdx = i; renderQ(); }
  }
}

function showResult() {
  wrongQuiz = [];
  wrongAnswers = [];
  for (var i = 0; i < quiz.length; i++) {
    if (answers[i] !== quiz[i].answer) {
      wrongQuiz.push(quiz[i]);
      wrongAnswers.push(-1);
    }
  }
  if (wrongQuiz.length === 0) {
    showFinalSummary();
    return;
  }
  phase = 'retry';
  wrongIdx = 0;
  document.getElementById('quizArea').style.display = 'block';
  document.getElementById('resultScreen').style.display = 'none';
  var info = document.getElementById('info');
  info.innerHTML = 'Lam lai ' + wrongQuiz.length + ' cau sai. Hay chon dap an dung.';
  renderDots();
  renderQ();
}

function showFinalSummary() {
  phase = 'done';
  document.getElementById('quizArea').style.display = 'none';
  document.getElementById('resultScreen').style.display = 'block';
  
  var firstCorrect = 0;
  for (var i = 0; i < quiz.length; i++) {
    if (answers[i] === quiz[i].answer) firstCorrect++;
  }
  var retryCorrect = 0;
  for (var i = 0; i < wrongQuiz.length; i++) {
    if (wrongAnswers[i] === wrongQuiz[i].answer) retryCorrect++;
  }
  var totalCorrect = firstCorrect + retryCorrect;
  
  var label = 'Lan 1: ' + firstCorrect + '/' + quiz.length + ' dung';
  if (wrongQuiz.length > 0) label += ' | Lam lai: ' + retryCorrect + '/' + wrongQuiz.length + ' dung';
  label += ' | Tong: ' + totalCorrect + '/' + quiz.length + ' dung';
  
  document.getElementById('scoreDisplay').textContent = totalCorrect + ' / ' + quiz.length;
  var pct = Math.round(totalCorrect / quiz.length * 100);
  document.getElementById('scoreDetail').textContent = label + '  |  Ti le dung: ' + pct + '%';
  
  var list = document.getElementById('reviewList');
  list.innerHTML = '<h3 style="margin:20px 0 10px">Chi tiet cau hoi:</h3>';
  
  for (var i = 0; i < quiz.length; i++) {
    var q = quiz[i];
    var isCorrect = answers[i] === q.answer;
    var wasWrong = wrongQuiz.some(function(wq) { return wq.id === q.id; });
    var retried = false;
    var retryOK = false;
    for (var j = 0; j < wrongQuiz.length; j++) {
      if (wrongQuiz[j].id === q.id) {
        retried = true;
        if (wrongAnswers[j] === wrongQuiz[j].answer) retryOK = true;
        break;
      }
    }
    var div = document.createElement('div');
    div.className = 'reviewItem';
    var status = isCorrect ? '✅' : '❌';
    if (wasWrong && retryOK) status = '⚠️';
    var userText = answers[i] >= 0 ? q.opts[answers[i]] : '(chua tra loi)';
    var detail = '<div class="rq">' + status + ' Cau ' + q.id + ': ' + q.text + '</div>' +
      '<div class="ra ' + (isCorrect ? 'c' : 'w') + '">Lan 1: ' + userText + '</div>';
    if (retried) {
      var retryAns = wrongAnswers[j];
      var retryText = retryAns >= 0 ? q.opts[retryAns] : '(chua tra loi)';
      detail += '<div class="ra ' + (retryOK ? 'c' : 'w') + '">Lam lai: ' + retryText + '</div>';
    }
    if (!isCorrect && !retryOK) {
      detail += '<div class="ra c">Dap an dung: ' + q.opts[q.answer] + '</div>';
    }
    div.innerHTML = detail;
    list.appendChild(div);
  }
  
  document.getElementById('info').textContent = '150 cau hoi An toan thong tin';
}

document.getElementById('prevBtn').disabled = true;
</script>
</body>
</html>
