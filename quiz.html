<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz ATTT</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Tahoma,sans-serif;background:#f0f4f8;color:#333;min-height:100vh;display:flex;justify-content:center;padding:20px}
.container{max-width:800px;width:100%}
h1{text-align:center;color:#1a56db;margin:20px 0;font-size:1.5em}
#info{text-align:center;color:#666;margin-bottom:20px;font-size:0.9em}
#startScreen,#resultScreen{text-align:center;background:white;border-radius:12px;padding:40px 30px;box-shadow:0 2px 12px rgba(0,0,0,0.08);margin-top:40px}
#startScreen h2,#resultScreen h2{margin-bottom:15px;color:#1a56db}
#startScreen p{margin-bottom:25px;color:#666;line-height:1.6}
.btn{background:#1a56db;color:white;border:none;padding:12px 32px;border-radius:8px;font-size:1em;cursor:pointer;transition:background .2s}
.btn:hover{background:#1648c0}
.btn:disabled{background:#94a3b8;cursor:not-allowed}
#quizArea{display:none}
#progress{display:flex;align-items:center;gap:12px;margin-bottom:15px;flex-wrap:wrap}
#progressBar{flex:1;height:8px;background:#e2e8f0;border-radius:4px;overflow:hidden;min-width:100px}
#progressFill{height:100%;background:#1a56db;border-radius:4px;transition:width .3s}
#qCounter{font-size:.85em;color:#666;white-space:nowrap}
#card{background:white;border-radius:12px;padding:25px;box-shadow:0 2px 12px rgba(0,0,0,0.08)}
#qBadge{display:inline-block;background:#e8f0fe;color:#1a56db;padding:4px 12px;border-radius:12px;font-size:.8em;margin-bottom:12px}
#qText{font-size:1.05em;line-height:1.6;margin-bottom:20px}
.opt{display:block;width:100%;text-align:left;padding:12px 16px;margin:6px 0;border:2px solid #e2e8f0;border-radius:8px;background:white;cursor:pointer;font-size:.95em;transition:all .15s}
.opt:hover:not(.disabled){border-color:#93c5fd;background:#f0f7ff}
.opt.answered{border-color:#1a56db;background:#e8f0fe}
.opt.correct{border-color:#16a34a;background:#dcfce7}
.opt.wrong{border-color:#dc2626;background:#fee2e2}
.opt.disabled{cursor:default;opacity:.85}
#nav{display:flex;justify-content:space-between;align-items:center;margin-top:20px;gap:10px}
#nav .btn{padding:10px 24px;font-size:.9em}
#qDots{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:15px}
.dot{width:22px;height:22px;border-radius:50%;border:2px solid #cbd5e1;background:white;cursor:pointer;font-size:.65em;display:flex;align-items:center;justify-content:center;transition:all .15s}
.dot.answered{border-color:#1a56db;background:#dbeafe}
.dot.correct{border-color:#16a34a;background:#bbf7d0}
.dot.wrong{border-color:#dc2626;background:#fecaca}
.dot.current{border-width:3px;border-color:#1a56db;transform:scale(1.1)}
#resultScreen{display:none}
.score{font-size:2.5em;font-weight:bold;color:#1a56db;margin:15px 0}
.score-detail{color:#666;margin-bottom:20px;line-height:1.6}
#wrongBtn{margin-bottom:15px}
#reviewList{text-align:left;margin-top:20px;max-height:400px;overflow-y:auto}
.reviewItem{padding:12px;border-bottom:1px solid #e2e8f0}
.reviewItem:last-child{border-bottom:none}
.reviewItem .rq{font-weight:600;margin-bottom:4px}
.reviewItem .ra{font-size:.9em;color:#666}
.reviewItem .ra.c{color:#16a34a}
.reviewItem .ra.w{color:#dc2626}
@media(max-width:600px){
body{padding:10px}
#card{padding:16px}
.opt{padding:10px 12px;font-size:.9em}
#qDots{gap:3px}
.dot{width:18px;height:18px;font-size:.55em}
}
</style>
</head>
<body>
<div class="container">
<h1>📚 Quiz ATTT</h1>
<div id="info">150 câu hỏi An toàn thông tin</div>

<div id="startScreen">
  <h2>🎯 Bắt đầu làm bài</h2>
  <p>Trắc nghiệm An toàn thông tin<br>Từ ngân hàng 150 câu hỏi.</p>
  <button class="btn" onclick="startQuiz()">▶ Làm bài ngay</button>
</div>

<div id="quizArea">
  <div id="qDots"></div>
  <div id="progress">
    <span id="qCounter">1 / 150</span>
    <div id="progressBar"><div id="progressFill"></div></div>
  </div>
  <div id="card">
    <div id="qBadge"></div>
    <div id="qText"></div>
    <div id="options"></div>
    <div id="nav">
      <button class="btn" id="prevBtn" onclick="prevQ()">◀ Trước</button>
      <button class="btn" id="nextBtn" onclick="nextQ()">Sau ▶</button>
    </div>
  </div>
</div>

<div id="resultScreen">
  <h2>🏆 Kết quả</h2>
  <div class="score" id="scoreDisplay">0/150</div>
  <div class="score-detail" id="scoreDetail"></div>
  <button class="btn" id="wrongBtn" onclick="retryWrong()" style="display:none">🔄 Làm lại câu sai</button>
  <br><br>
  <button class="btn" onclick="startQuiz()">🔄 Làm lại từ đầu</button>
  <div id="reviewList"></div>
</div>
</div>

<script>
var ALL_QUESTIONS = [{"id": "1", "text": "Ba mục tiêu cốt lõi của an toàn thông tin (m6 hinh CIA) bao gồm những", "answer": 1, "opts": ["Confidentiality (Tinh bao mat) — Integration (Tinh tich hợp) — Authentication (Xác thực)", "Confidentiality (Tinh bao mat) - Integrity (Tinh toan ven) — Availability (Tinh san sang)", "Control (Kiém soát) — Integrity (Tinh toàn ven) — Access (Truy cap)", "Cryptography (Ma hóa) - Integrity (Tinh toàn ven) — Availability (Tinh san sang)"]}, {"id": "2", "text": "Nguyén tac 'Least Privilege’ (Quyén téi thiéu) trong bao mat hé théng được", "answer": 2, "opts": ["Cap cho người dung tat ca cdc quyén dé lam viéc dé dang.", "Khong cap bat ky quyén truy cap nao cho nhan vién thông thường.", "Chi cap dung các quyén tối thiéu can thiết dé hoan thành công viéc được giao.", "Cấp quyén truy cap dua trén tham nién lam việc."]}, {"id": "3", "text": "Chién lược phòng tht 'Defense in Depth' (Phong thủ chiéu sau) có đặc", "answer": 1, "opts": ["Sử dung mét bức tường lửa that mạnh ở vòng ngoài.", "Sử dụng nhiều lớp bảo vệ độc lập từ ngoài vào trong.", "Chỉ tập trung bảo mật cho lớp cơ sở dữ liệu cốt lõi.", "Giấu toàn bộ mã nguồn của ứng dụng."]}, {"id": "4", "text": "Yếu tố nao được coi la tuyến phòng thủ quan trong nhất nhưng cũng là", "answer": 2, "opts": ["Hé théng Firewall", "Thuật toan ma hóa", "Con người (Người dung va Quan tri viên)", "Hé théng IDS"]}, {"id": "5", "text": "Tan công ‘Passive Attack' (Tan công thy động) khác voi tan công chủ dong", "answer": 1, "opts": ["Lam thay déi hoặc pha hủy trực tiếp dữ liệu trên hệ thóng.", "Chi lén lút nghe trom va thu thập thông tin ma không lam thay déi dữ liệu.", "Gay ra hiện tượng từ chối dich vu.", "Luôn kích hoạt các cảnh báo trên hệ thống IDS."]}, {"id": "6", "text": "Hình thức tan công nao nhằm mục dich lam can kiệt tai nguyên hệ thống,", "answer": 2, "opts": ["Phishing", "SQL Injection", "DDoS", "Man-in-the-Middle"]}, {"id": "7", "text": "Ky thuật tan công 'Phishing' thường ste dung phương thức chủ yéu nao?", "answer": 0, "opts": ["Gửi thong diép gia mao các tổ chức uy tin dé lừa người dung cung cap thông tin.", "Chén ma độc vao co’ sở dữ liéu.", "Bé khóa mat khẩu bang phương phap Brute Force.", "Quét cdc céng dang mở trén may chu."]}, {"id": "8", "text": "M6 hình kién trúc an ninh mang nao hoạt động theo nguyén tac 'Không bao", "answer": 1, "opts": ["Perimeter Security", "Zero Trust", "Defense in Depth", "SSO Security"]}, {"id": "9", "text": "SOC trong lĩnh vực an toan thong tin la viết tat của từ gi?", "answer": 1, "opts": ["System Operations Control", "Security Operations Center", "Secure Object Configuration", "Standard Operations Checklist"]}, {"id": "10", "text": "Lỗ hồng SQL Injection xảy ra chu yéu do nguyén nhan nao?", "answer": 0, "opts": ["Khong loc dữ liệu dau vào va néi chuỗi trực tiếp vào cau lệnh SQL.", "Ste dung co’ ché PreparedStatement.", "Ma hóa mat khẩu yéu.", "Khéng cau hinh Firewall."]}, {"id": "11", "text": "Dé phòng chéng SQL Injection ở mức mA nguồn một cach triệt dé nhất,", "answer": 1, "opts": ["Statement két hop nối chuỗi ky tu.", "PreparedStatement (Parameterized Queries).", "Ma hóa MD5 cho toàn bộ dữ liệu.", "Kiểm tra dữ liệu bang JavaScript ở Client."]}, {"id": "12", "text": "Tan cong XSS (Cross-Site Scripting) được định nghia là gi?", "answer": 1, "opts": ["Chén ma SQL độc hai vao co’ sở dé liệu.", "Chèn các doan ma kich ban (JavaScript) độc hai dé thực thi trên trình duyệt của người dùng.", "Can thiệp trực tiếp vào bộ nhớ RAM của Server.", "Tan công từ chối dich vy nhằm vào céng 80."]}, {"id": "13", "text": "Lỗ hồng Stored XSS nguy hiém hon Reflected XSS ở diém nao?", "answer": 0, "opts": ["Ma độc được lưu vinh viễn vào CSDL va ty động tan công moi người dùng truy cap trang.", "No co thé danh cap mat khau may chu.", "No thực thi ma bang ngôn ngữ C++ thay vi JavaScript.", "No bỏ qua được moi loai Tường lửa phan cứng."]}, {"id": "14", "text": "Chinh sach bao mat Same-Origin Policy (SOP) quy dinh cac trang web", "answer": 1, "opts": ["Giao thức, Tén mién va Dia chi IP.", "Giao thức, Tên mién va Céng két nối (Port).", "Tén mién, Trinh duyệt va Céng kết nối.", "Hé diéu hành, Giao thức va Tén miền."]}, {"id": "15", "text": "Lỗ hồng CSRF (Cross-Site Request Forgery) có co’ ché hoạt động như", "answer": 1, "opts": ["Ep trinh duyệt của nan nhan tai ma độc vé may.", "Loi dung phién dang nhap hợp lệ cua nan nhan dé gửi cac yéu cau HTTP trai phép dén may chủ.", "Can thiệp vao giao thức HTTPS dé lay cap gói tin.", "Danh cap Cookie bang ma JavaScript độc hai."]}, {"id": "16", "text": "Giải pháp hiéu qua nhat dé phòng chéng tan công CSRF trên ứng dung", "answer": 1, "opts": ["Ma hóa mat khẩu người dung.", "Ste dung Anti-CSRF Token duy nhat cho méi biéu mau (Form).", "Chan hoan toan ma JavaScript chay trén trinh duyét.", "Chi sử dung phương thức HTTP GET cho moi yéu cau."]}, {"id": "17", "text": "Công cu nao sau day đóng vai tro là Intercepting Proxy phé bién dé kiểm", "answer": 2, "opts": ["Nmap", "Wireshark", "Burp Suite / OWASP ZAP", "Metasploit"]}, {"id": "18", "text": "Co ché 'Data Masking’ trong co sở dữ liệu nhằm muc dich gi?", "answer": 1, "opts": ["Ma hoa toàn bộ dia cứng lưu trữ.", "Che giấu dé liệu nhạy cam (như thay sé thé thành XXXX) khi hién thi cho người dung không co tham quyền.", "Nguy trang may chủ CSDL dưới một dia chi IP gia.", "Xóa vinh vién dé liệu cũ."]}, {"id": "19", "text": "Nguyên tắc 'Separation of Duties' (Phân tách nhiệm vụ) trong CSDL có ý", "answer": 1, "opts": ["Giao toàn quyền cho một người quản trị duy nhất.", "Chia nhỏ vai trò để tránh một cá nhân có toàn quyền thực hiện một chuỗi hành động nhạy cảm.", "Chia CSDL thành các bảng nhỏ không liên kết.", "Không cho phép bất kỳ ai truy cập CSDL vào ban đêm."]}, {"id": "20", "text": "Trong mô hình AAA bảo mật dữ liệu, 'Accounting' đảm nhận vai trò gì?", "answer": 2, "opts": ["Xác thực danh tính người dùng.", "Phan quyén truy cap các bang dé liéu.", "Ghi nhat ky (Auditing) va giam sat moi thao tac trén hé théng.", "Dam bao tinh san sang của hé thong."]}, {"id": "21", "text": "Dé bao mat API theo hướng phi trang thai (Stateless), chuan Token nao", "answer": 2, "opts": ["Basic Authentication", "Session Cookie", "JWT (JSON Web Token)", "NTLM"]}, {"id": "22", "text": "Phan 'Signature' trong cau trúc của một chuỗi JWT dung dé lam gi?", "answer": 0, "opts": ["Dam bao tinh toan ven, xác minh Token không bi gid mao hay thay đồi.", "Nén dung lượng cua Token.", "Ma hóa nội dung dé người dùng khong doc được payload.", "Quy định thoi gian sống của Token."]}, {"id": "23", "text": "Ky thuật bao vệ bộ nhớ ASLR trên hệ điều hanh hoạt động theo nguyén ly", "answer": 1, "opts": ["Chan các tién trinh không có chữ ky số khởi chạy.", "Xáo trộn ngẫu nhiên vị trí các vùng dữ liệu trong bộ nhớ dé chan tan công tran bộ dém.", "Cấm thực thi ma trén toàn bộ không gian RAM.", "Khóa dia chi IP của kẻ tan cong ngay lập tức."]}, {"id": "24", "text": "Tính năng DEP (Data Execution Prevention) của hệ điều hành nhằm mục", "answer": 0, "opts": ["Đánh dau một sé vung bộ nhớ Ia 'không được thực thi’ dé chan ma độc chạy từ vùng đệm dữ liệu.", "Mã hóa toàn bộ các file văn bản trên đĩa cứng.", "Chan tai các file exe từ mang Internet.", "Ty động khôi phuc dữ liéu bi xóa."]}, {"id": "25", "text": "Chip bao mat TPM (Trusted Platform Module) trén mainboard cung cap", "answer": 1, "opts": ["Tang téc độ xử ly dé hoa cho hệ điều hành.", "Luu trữ khóa ma hóa an toàn ở mức phan cứng va hỗ tro’ Secure Boot.", "Cung cap két néi mang VPN phan cứng.", "Ngan chan tan công DDoS vào hé thống."]}, {"id": "26", "text": "Malware nao co kha nang tự nhan ban va phat tan độc lap qua mang ma", "answer": 1, "opts": ["Virus", "Worm", "Trojan", "Spyware"]}, {"id": "27", "text": "Trojan Horse trong an ninh mang có dac tinh lay nhiém nhu thé nao?", "answer": 1, "opts": ["Tự déng lay lan qua các céng mang dang me.", "Nguy trang dưới vd boc một phan mém hop pháp, hữu ich dé lừa người dung tai vé cai dat.", "Chi lay nhiém qua các file tai liệu Word macro.", "Chan hoan toan kết néi Internet của may nan nhan."]}, {"id": "28", "text": "Ky thuat 'Polymorphism' (Bién hình) giúp ma độc dat được muc dich gi?", "answer": 0, "opts": ["Tự động thay déi ma dé tao chi ky khác nhau sau mỗi lan lay nhiễm nham qua mat phan mém diét virus.", "Chuyén từ Virus thành Ransomware trong tich tac.", "Ngan chan người dung gỡ cai dat ma độc.", "Tang tốc độ gửi dữ liệu lay cap ra bên ngoài."]}, {"id": "29", "text": "Mục dich chính của hệ thống Firewall trong ha tang mang là gi?", "answer": 1, "opts": ["Ma hoa toàn bộ dữ liéu di qua mang LAN.", "Kiểm soát va loc lưu lượng mang ra/vao hệ thống dua trên các bộ quy tac (Rules) duoc cau hình trước.", "Phat hién ma độc da hinh dang 4n nau trong RAM.", "Cung cap kết nối Wi-Fi miễn phi cho người dung doanh nghiép."]}, {"id": "30", "text": "Diém khác biét cốt Idi giữa IDS (Intrusion Detection System) va IPS", "answer": 1, "opts": ["IDS dung cho may chu Web, IPS dung cho may chu Database.", "IDS chi phat hién va canh bao hành vi bat thường, còn IPS có kha nang chu động can thiép va ngan chan cuộc tan cong.", "IDS la phan cứng, IPS la phan mém.", "IDS ma héa đường truyén con IPS chi phan tich log."]}, {"id": "31", "text": "Cong nghé VPN (Virtual Private Network) bao vé dữ liéu truyén tai qua", "answer": 1, "opts": ["Chan tat ca các gói tin dén từ dia chi IP nước ngoài.", "Tao một đường ham ma hoa (Encrypted Tunnel) từ diém cuối tới điểm cuối.", "Quét virus moi file trước khi gửi di.", "Tw động déi mat khdu dang nhập mang liên tục."]}, {"id": "32", "text": "Thuật ngữ 'Shift-left Security’ trong quy trinh phat trién phan mém an toan", "answer": 2, "opts": ["Giao toan bộ công việc kiém tht? cho đội van hành.", "Chi kiém tra lỗi ở giao dién phía bên trai ứng dung.", "Tich hop các hoat động kiểm thử bao mat vao càng sớm cang tét, ngay từ những khau dau tién của quy trinh phat triển.", "Thực hién bao mat sau khi san phẩm da được trién khai (Deploy)."]}, {"id": "33", "text": "Trong mô hình DevSecOps, bao mat được nhin nhận như thé nao?", "answer": 1, "opts": ["La trách nhiệm duy nhat của đội ngũ An ninh mang (Security Team).", "La trach nhiém chung cua toàn bộ đội ngũ, duoc ty động hóa xuyên suốt chuỗi CI/CD.", "La bước kiém tra cuối cùng bat buộc trước khi phat hanh san phẩm.", "La quy trinh thủ công chi 4p dung cho ma nguồn Java."]}, {"id": "34", "text": "Phuong pháp kiểm tht tinh SAST (Static Application Security Testing) có", "answer": 1, "opts": ["Tan cong gia lap vao ứng dung khi tng dung dang chay ở môi trường thực té.", "Phan tich va quét mã nguồn (Source Code) dé tim lỗi bao mat ma không can thực thi chương trinh.", "Chi giám sat lưu lượng mang di qua tường lửa.", "Phan tích hanh vi cua người dung trên ứng dung Web."]}, {"id": "35", "text": "Phuong pháp kiém tht động DAST (Dynamic Application Security", "answer": 2, "opts": ["Kiém tht? hộp trang (White-box testing).", "Kiém thử tinh qua phan tich ma nguồn.", "Kiém thử hộp den (Black-box testing) trên ứng dung dang chay (Runtime).", "Kiém tra phién ban của các thu viện bén thứ ba."]}, {"id": "36", "text": "Cong cu phan tich cau phan phan mém SCA (Software Composition", "answer": 0, "opts": ["Phat hién các lỗ héng da biét trong các thu viện phụ thuộc mã nguồn mở (Open Source Dependencies) được tich hop vao ứng dung.", "Quét céng (Port scanning) trên may chủ Production.", "Mã hóa mat khẩu CSDL.", "Chéng lai cdc cuộc tan cong từ chối dich vu."]}, {"id": "37", "text": "Ky thuat tan công 'Blind SQL Injection’ doi hỏi hacker phai làm gi dé trích", "answer": 2, "opts": ["Đọc trực tiếp nội dung CSDL in trén man hình trang web.", "Cho doi hé théng gửi email chứa dữ liệu vé may của hacker.", "Hỏi các cau hỏi logic Dung/Sai (Boolean) hoặc dựa vao độ tré thoi gian (Time-based) cua may chu.", "Khởi động lai may chu ứng dung."]}, {"id": "38", "text": "Tinh nang 'Secure Cookie' trên trình duyệt giúp bao vé Cookie khỏi rủi ro", "answer": 0, "opts": ["Ngan chan viéc gửi Cookie qua các két nối HTTP không duoc ma hóa (chi gửi qua HTTPS).", "Ngan chan XSS doc Cookie thông qua thuộc tinh HttpOnly.", "Ma hóa gia tri Cookie bang thuat toán AES-256.", "V6 hiéu hóa viéc tao Cookie moi trén trình duyệt."]}, {"id": "39", "text": "Tinh nang 'HttpOnly' được thiết lap cho Cookie có tac dung bao mat gi?", "answer": 2, "opts": ["Ngăn chan các truy van SQL Injection.", "Chi cho phép kết nối qua giao thức HTTPS.", "Ngăn chan ma JavaScript ở phía Client (bao gdm ca ma độc XSS) truy cap va doc duoc nội dung của Cookie.", "Ngan chan tan cong CSRF tự động gửi Form."]}, {"id": "40", "text": "WAF (Web Application Firewall) khac voi Network Firewall thong thường", "answer": 0, "opts": ["WAF chuyén phan tích lưu lượng ở tang ứng dung (Lop 7 - HTTP/HTTPS) dé chan các cuộc tan cong nhu SQLi, XSS.", "WAF hoat động ở tang giao van (Lop 4) dé chan IP va Port.", "WAF khong thé giải ma các kết nối HTTPS.", "WAF chi co thé được cai dat dưới dang thiét bi phan cứng."]}, {"id": "41", "text": "Hau qua nghiém trong nhat của viéc cau hinh hệ théng sai (Security", "answer": 1, "opts": ["Giao dién trang web hién thi sai mau sac.", "Lam lộ các thu mục an, file cầu hinh hoặc cấp quyền truy cap trai phép cho kẻ tan cong bén ngoài.", "Tang tốc độ truy xuất dữ liệu một cach bat thường.", "Ty động khởi động lai dich vu định ky."]}, {"id": "42", "text": "Ransomware (Ma độc t6ng tién) cd hành vi pha hoại dién hinh nao?", "answer": 2, "opts": ["Xóa sach toan bộ hệ diéu hành ngay khi lay nhiễm.", "Lén lút sử dung CPU của nan nhan dé dao tién ao.", "Ma hóa toàn bộ dữ liệu quan trong của nan nhan va yéu cau tra tiền chuộc dé lay khóa giải ma.", "Tw động gửi email chứa quang cao rac dén danh ba nan nhan."]}, {"id": "43", "text": "Ky thuat 'Obfuscation' (Lam mờ ma) thường được tin tac sử dung với muc", "answer": 1, "opts": ["Lam cho ma déc chay nhanh hon.", "Lam cho cau truc ma nguồn trở nên rồi ram, khó doc, gay khó khan cho viéc phan tich va dich ngược (Reverse Engineering).", "Tang kich thước file ma độc dé tránh bi phat hién.", "V6 hiéu hóa két nối mang của hé théng."]}, {"id": "44", "text": "Thuat ngữ 'Zero-day Exploit' am chi loai ma khai thac nao?", "answer": 1, "opts": ["Khai thác dựa trén mat khẩu mac dinh (000000).", "Khai thác lỗ héng bao mat chưa từng được cong bé va nha san xuat phan mém chua co ban va (Patch).", "Khai thác lỗ héng đã được va cach day nhiéu nam nhung người dung chưa cap nhat.", "Tan công lam sap hé thống trong 0 ngày."]}, {"id": "45", "text": "Rootkit là mot dang phan mềm độc hai có chức nang chuyén biét gi?", "answer": 2, "opts": ["Ma hóa dia cứng va doi tiền chuộc.", "Theo dõi thao tac ban phim (Keylogger).", "Can thiép sau vao nhan hệ diéu hanh (Kernel) dé che giấu sự t6n tai của cdc ma độc khác hoặc các tién trinh trai phép.", "Hién thi các bang quang cao Pop-up liên tục."]}, {"id": "46", "text": "Khi quan tri vién phat hién hệ thống may chủ viva bi xâm nhập, hanh động", "answer": 2, "opts": ["Lap tức tat nguồn may chủ bang cach rut phich cam.", "Xda toan bộ log hệ théng dé don dep.", "Cé lap (Isolate) hé théng bi nhiễm khỏi mang nội bộ dé ngăn chan lây lan nhưng van duy tri trang thai dé diéu tra.", "Format lai toan bộ 6 dia cứng va cai lai từ dau."]}, {"id": "47", "text": "Kién tric DMZ (Demilitarized Zone) trong thiét ke mang có tac dung gi?", "answer": 1, "opts": ["La khu vực chứa cac may chu nội bộ cực ky quan trong, cach ly hoan toan voi Internet.", "La một phan mang trung gian chứa cac dich vy cong khai (Web, Mail, DNS) déi mat voi Internet, giúp tach biét va bao vé mang nội bộ.", "La mang WiFi danh riéng cho khach truy cap.", "La trung tam diéu hanh SOC."]}, {"id": "48", "text": "Khai niệm 'Social Engineering’ trong các cuộc tan công mang nhắm vào", "answer": 2, "opts": ["Lỗ héng ma nguồn C++.", "Thuat toan bam SHA-256.", "Su chu quan, thiéu hiéu biét va lòng tin của con người.", "Tinh nang dinh tuyến của thiét bi Router."]}, {"id": "49", "text": "Quy trình CI/CD trong phat trién phan mềm là viết tat của từ gi?", "answer": 0, "opts": ["Continuous Integration / Continuous Deployment (Tich hop liên tục / Trién khai lién tuc)", "Code Inspection / Code Deployment", "Continuous Inspection / Constant Delivery", "Controlled Integration / Continuous Development"]}, {"id": "50", "text": "Botnet (Mang may tinh ma) thường được tin tac sử dung nhiéu nhat cho", "answer": 1, "opts": ["SQL Injection", "Tan công tiv chối dich vu phan tan (DDoS)", "Man-in-the-Middle", "Cross-Site Scripting (XSS)"]}, {"id": "51", "text": "Hình thức tan công 'Spear Phishing’ khác voi 'Phishing' truyền thống ở", "answer": 2, "opts": ["St dung ma độc tồng tiền thay vi đánh cắp mat khẩu.", "Phan tan quy mô lớn hang triệu email ngẫu nhiên.", "Nhắm muc tiéu cy thé vào mét ca nhân hoặc tổ chức sau khi đã thu thap thong tin chi tiét vé ho.", "Chi thực hiện được qua mang nội bộ LAN."]}, {"id": "52", "text": "Tan cong Man-in-the-Middle (MITM) la gi?", "answer": 1, "opts": ["Ké tan cong danh sap may chủ trung gian.", "Ké tan công bi mat chen ngang vao giữa luồng giao tiếp của hai bén dé nghe lén hoặc stra déi dữ liéu.", "Tan công trực tiếp vao co’ sở dữ liệu của ứng dung.", "Phat tan ma độc qua một thiết bi USB trung gian."]}, {"id": "53", "text": "Hệ théng SIEM (Security Information and Event Management) có chức", "answer": 1, "opts": ["Ngan chan các cuộc tan cong DDoS vào hệ théng Web.", "Thu thập, lưu tri, phan tich log va sy kiện bao mat từ nhiều nguồn dé phat hiện méi de doa.", "Ma hóa toàn bộ cơ so’ dữ liệu cua doanh nghiệp.", "Tự động vá lỗi hệ điều hành."]}, {"id": "54", "text": "Tan cong 'Brute Force’ vao chức nang dang nhap hoạt động theo nguyén", "answer": 0, "opts": ["Thử nghiém ngẫu nhiên hoặc tuan ty tat ca các tổ hop ky ty có thé dé tim ra mat khau dung.", "Ste dung một doan ma SQL dé bypass man hinh dang nhập.", "Danh cap cookie phién lam viéc của người dung.", "Chèn ma JavaScript độc hai vao tén dang nhập."]}, {"id": "55", "text": "Tan cong ‘Dictionary Attack’ tối wu hon Brute Force thông thường ở diém", "answer": 1, "opts": ["No bỏ qua bước kiém tra mat khẩu.", "Chi tht các mat khẩu có ý nghia, cac tir thong dung từ một danh sach (từ dién) duoc bién soan san.", "No danh sap may chu nhanh hon.", "No có thé giải ma duoc thuat toán bam SHA-256."]}, {"id": "56", "text": "Lỗ hồng Broken Authentication thường xuất hiện khi hé thống bỏ qua viéc", "answer": 1, "opts": ["Sử dụng WAF chặn IP lạ.", "Quan ly phiên lam việc kém an toan, cho phép mat khẩu yéu, thiéu giới han sé lan dang nhap sai.", "Loc cac ky tự nhay đơn (’) trong input.", "St dung chứng chi HTTPS/SSL."]}, {"id": "57", "text": "Lỗ hồng IDOR (Insecure Direct Object References) xảy ra khi nao?", "answer": 1, "opts": ["Hệ thống hién thi trực tiếp cầu trúc thu mục của may chu.", "Ứng dụng cho phép người dùng truy cập dữ liệu của người khác bằng cách thay déi gia tri tham số định danh (như id=1 thành id=2) ma không kiém tra quyền.", "Ma hóa sai déi tượng dữ liệu trong bộ nhớ.", "Cho phép upload file chứa mã độc lên hệ thống."]}, {"id": "58", "text": "DOM-based XSS khác biệt với Stored XSS va Reflected XSS ở điểm", "answer": 2, "opts": ["Ma déc được thực thi ở may chu Backend.", "Ma doc lay nhiém thong qua file đính kèm email.", "Lỗ héng tồn tai hoàn toan trong qua trinh xử ly ma JavaScript của trình duyét phia Client (DOM), gói tin HTTP không nhat thiét chứa ma doc.", "Chi nhắm vào người dung có quyén Quan tri viên (Admin)."]}, {"id": "59", "text": "Content Security Policy (CSP) la co ché bao mat dung dé phòng chống", "answer": 2, "opts": ["SQL Injection", "DDoS", "Cross-Site Scripting (XSS)", "Local File Inclusion"]}, {"id": "60", "text": "CORS (Cross-Origin Resource Sharing) duoc sử dung nhằm muc dich", "answer": 1, "opts": ["Chan toan bộ cac yéu cau HTTP ngoai lai.", "Cho phép mot trang web gửi yéu cau truy cap tai nguyén toi một tên mién khác một cach an toàn va có kiểm soát.", "Mã hóa dữ liệu liên miền.", "Đồng bộ hóa dữ liệu giữa các máy chủ."]}, {"id": "61", "text": "Nguy co lớn nhất của lỗ héng File Upload không an toàn là gi?", "answer": 1, "opts": ["May chu bj can kiét dung lượng dia cứng.", "Ké tan công tai lên file ma độc (Web Shell), sau đó thuc thi dé chiém toàn quyén kiểm soat may chủ Web.", "Ứng dung bi cham do phai xử ly Anh d6 phan giải cao.", "Thay déi giao dién của ứng dung web."]}, {"id": "62", "text": "Ky thuật Directory Traversal (Path Traversal) nhằm muc dich gi?", "answer": 1, "opts": ["Xóa toan bộ thu muc web.", "Doc cac file nhay cam bên ngoai thu mục géc của ứng dung (vi du: ../../../etc/passwd).", "Tai cac file giao dién vé may ca nhan.", "Déi tén thu mục trén may chu."]}, {"id": "63", "text": "Tan cong Session Hijacking (Danh cap phiên) thường loi dung diéu kién", "answer": 0, "opts": ["Ké tan cong biét được Session ID hợp lệ cua người dùng qua XSS hoặc bat gói tin.", "Mat khẩu của người dung qua yéu.", "May chủ không kiém tra ma CAPTCHA.", "Ứng dung bi lỗi SQL Injection."]}, {"id": "64", "text": "Trong bao mat CSDL, ky thuật Tokenization (Ma hóa thay thé) hoạt động", "answer": 1, "opts": ["Xóa hoan toàn dữ liệu nhạy cam khỏi hé théng.", "Thay thé dé liệu nhạy cam (như sé thé tin dung) bang một chuỗi ky tw vô nghĩa (Token), dữ liệu that được cat ở ham chứa an toàn.", "Dung ham bam mot chiều dé bam dé liệu.", "Ma hóa dữ liệu bang thuật toán RSA."]}, {"id": "65", "text": "KMS (Key Management Service) trong hạ tằng đám mây có vai trò gì?", "answer": 1, "opts": ["Lọc các gói tin mạng độc hại.", "Quản lý tập trung vòng đời, tạo và lưu trữ an toàn các khóa mã hóa bảo vệ cơ sở dữ liệu.", "Phat hiện ma độc Ransomware.", "Tw dong phan quyén truy cap cho nhân vién."]}, {"id": "66", "text": "Thanh phan nao dong vai tro như một 'chốt chặn' tap trung dé xt? ly xác", "answer": 2, "opts": ["Web Server", "Database Server", "API Gateway", "Load Balancer"]}, {"id": "67", "text": "KY thuat 'Rate Limiting’ trong bao mat API nhằm ngăn chan loại tan công", "answer": 1, "opts": ["SQL Injection", "Brute Force, DDoS va lam dung tai nguyén", "Cross-Site Scripting (XSS)", "Man-in-the-Middle"]}, {"id": "68", "text": "OAuth 2.0 la mot tiêu chuan giao thức được ste dung chủ yéu cho mục", "answer": 1, "opts": ["Truyền tai file mã hóa an toàn.", "Uy quyền truy cap (Authorization) an toan ma không can chia sé mat khau góc.", "Ma hóa kênh truyền mang vat ly.", "Phat hién ma độc trong hé thống Web."]}, {"id": "69", "text": "Su khác biét cét Idi giữa Authentication (Xác thực) va Authorization (Phan", "answer": 0, "opts": ["Authentication kiém tra 'Bạn la ai?', Authorization kiém tra 'Ban được phép lam gì?'.", "Authentication kiém tra quyền truy cap thu muc, Authorization kiém tra mat khau.", "Ca hai đều cùng một ý nghia, chi khác tên gọi.", "Authentication bảo vệ CSDL, Authorization bảo vệ giao diện Web."]}, {"id": "70", "text": "Lỗ hồng BOLA (Broken Object Level Authorization) trong API thường dan", "answer": 1, "opts": ["Server API bi ngung hoat déng.", "Ké tan cong có thé truy cap, stra déi hoặc xóa tai nguyén của người dùng khác bang cach thao tac ID trên URL API.", "API tra vé thông bao lỗi dang ma HTML.", "Tat ca các token bi vô hiệu hóa."]}, {"id": "71", "text": "Vi sao qua trinh cap nhat ban va (Patch Management) cho Hé diéu hanh", "answer": 1, "opts": ["Giúp giao diện hé diéu hanh dep hon.", "Khắc phục cac lỗ héng da biết, ngăn chan hacker khai thac dé chiém quyén diéu khién hé théng.", "Tang dung lượng 6 dia tu dong.", "Giảm nhiét độ hoat déng cua CPU."]}, {"id": "72", "text": "Tinh nang bao vé CFG (Control Flow Guard) trén Windows co tac dung", "answer": 0, "opts": ["Ngan chan các luồng thực thi ma không hợp lệ, giảm thiéu các cuộc tan công khai thác lỗi hỏng bộ nhớ.", "Kiểm soát lưu lượng Internet giống Firewall.", "Giới hạn thời gian sử dụng máy tính của người dùng.", "Chặn quảng cáo trên trình duyệt Edge."]}, {"id": "73", "text": "Nguyên tắc 'Security by Design' yêu cầu điều gì trong quá trình phát triển", "answer": 1, "opts": ["Thiết kế giao diện người dùng có màu sắc cảnh báo rủi ro.", "Bảo mật phải được tích hợp vào mọi bước của chu kỳ phát triển ngay từ giai đoạn thiết kế kién trúc ban dau.", "Bao mat chi dành riéng cho kiến trúc sw phan mềm thiết ké.", "Mua các phan mém bao mat dat tién về tích hop sau khi ra mat."]}, {"id": "74", "text": "Cuộc tan công APT (Advanced Persistent Threat) co đặc điểm nỗi bat", "answer": 1, "opts": ["Tan cong 6 at, gay sap hé thống trong vai giây rồi rut lui.", "Cuộc tan công mục tiêu, tinh vi, diễn ra lén lút, duy tri sv tồn tại trong hệ thống thoi gian dai dé an cap dé liệu.", "Chi lay nhiém qua USB.", "Chi do những hacker nghiép du thực hién."]}, {"id": "75", "text": "Thuật ngữ 'Payload' trong thanh phan của một doan ma khai thác", "answer": 1, "opts": ["Cong cy dung dé quét lỗ héng mang.", "Goi dữ liệu hoặc ma lệnh déc hai sé được thực thi trôn may nan nhân sau khi khai thác thanh công.", "Kích thước cua file ma độc.", "Dia chi IP của ké tan cong."]}, {"id": "76", "text": "Spyware la phan mém độc hai co hanh vi chinh là gi?", "answer": 1, "opts": ["Ma héa 6 dia va doi tién.", "Bi mat thu thập thông tin, lich ste duyét web, thói quen của người dung va gửi vé cho ké tan công.", "Mở céng Backdoor cho hacker.", "Hién thi quang cao liên tục trén trình duyệt."]}, {"id": "77", "text": "Keylogger thuộc nhóm ma độc nao sau day dựa trên chức nang?", "answer": 1, "opts": ["Ransomware", "Spyware / Information Stealer", "Adware", "Worm"]}, {"id": "78", "text": "Ky thuật 'Metamorphism' cua Malware nguy hiém hon 'Polymorphism' ở", "answer": 0, "opts": ["Metamorphism tu động viết lai hoàn toan logic cau trúc mA nguồn của nó & moi lan lay nhiễm, khiến viéc phat hiện cực ky khó khan.", "No chi thay đổi khóa giải ma ở vd boc bên ngoài.", "Nó xóa toàn bộ 6 dia ma không can kích hoạt.", "Nó giả mạo địa chỉ MAC của thiết bị."]}, {"id": "79", "text": "Stateful Firewall (Tường lửa trạng thái) ưu việt hơn Stateless Firewall", "answer": 1, "opts": ["Xử ly tốc độ mang Gigabit.", "Theo dõi va ghi nhớ trang thai của toàn bộ phiên kết nối từ lúc mở dén lúc đóng, ngăn chan các gói tin gid mao thuộc về một kết nối không tồn tai.", "Chỉ kiểm tra đơn lẻ từng gói tin độc lập.", "Ngăn chặn được 100% mã độc Zero-day."]}, {"id": "80", "text": "Tường lửa thế hệ mới NGFW (Next-Generation Firewall) thường được", "answer": 0, "opts": ["Nhan diện người dung ca nhân (Identity-awareness), hệ thống phòng chống xâm nhập (IPS), và kiểm soát tận lớp Ứng dụng (Application Control).", "Chỉ có tính năng lọc địa chỉ IP và Port.", "Chi thêm tinh nang tang téc độ truyền tai nội dung tinh.", "Luu trữ sao lưu CSDL SQL."]}, {"id": "81", "text": "Co ché phat hiện IDS dựa trên 'Signature-based' (Dựa trén chi ky) hoat", "answer": 1, "opts": ["St dung Al dé phan doan lưu lượng độc hai.", "So sanh mau dữ liệu mang thu được voi co’ sở dữ liệu các mau ma độc/tấn cong da biết.", "Do lường bang thong sử dung của hé théng.", "Chi phan tich lưu lượng HTTPS da ma hóa."]}, {"id": "82", "text": "Co ché phat hiện IDS dựa trên 'Anomaly-based' (Dua trên hanh vi/bat", "answer": 2, "opts": ["Hoat động cực ky nhanh, tiéu tồn ít tai nguyên.", "Không bao giờ sinh ra cảnh báo giả (False Positive).", "Có kha nang phat hién ra cdc cuộc tan công Zero-day mdi chưa từng có trong cơ sở dữ liệu.", "Tự động vá lỗi hệ điều hành."]}, {"id": "83", "text": "Giao thức IPsec thường được str dung trong giải pháp bao mat nao dé", "answer": 2, "opts": ["Co sở dữ liéu", "Firewall ứng dung Web", "Mang riéng ao (VPN)", "Hé théng IDS"]}, {"id": "84", "text": "Khác biét giữa IPsec VPN va SSL/TLS VPN la gi?", "answer": 1, "opts": ["IPsec chạy trén trình duyét web, SSL can cai dat phan mém Client phức tap.", "IPsec cung cap két nối mang (Network-level), con SSL/TLS VPN thường dé dang truy cap linh hoat qua trinh duyét Web (Application-level).", "SSL VPN an toan hon IPsec VPN gap 10 Ian.", "IPsec VPN không hé tro’ ma hoa."]}, {"id": "85", "text": "Hệ thống 'Honeypot' trong kién trúc phòng thi mang được thiét lap nhằm", "answer": 1, "opts": ["Tang toc độ truy cap Internet cho nhan vién.", "La một hé théng gid mao được thiết kế cé tinh co 16 héng dé danh lừa, bay hacker tan công nhằm thu thập thông tin va chiến thuat của chung.", "Loc cac email rac.", "Chan người dung truy cap web den."]}, {"id": "86", "text": "Trong quy trình CI/CD an toan, bước 'SCA (Software Composition", "answer": 1, "opts": ["Kiém tra lỗi cú pháp của ngôn ngữ lap trinh.", "Phat hiện cdc lỗ héng (CVE) có san trong các thu viện Open Source ma dy an dang sử dung.", "Bién dich ma nguén thanh file thực thi.", "Day code lên môi trường Production."]}, {"id": "87", "text": "Ky thuật 'Secret Scanning’ trong DevSecOps dug sinh ra dé ngăn ngừa", "answer": 0, "opts": ["Lap trình vién v6 tinh commit các khóa API (API Keys), mat khau, token lên kho lưu trữ ma nguồn (vi du: GitHub, GitLab).", "Lap trình vién st dung phan mém bẻ khóa.", "Ngăn chan tan công DDoS vào hé thống Git.", "Kiém tra ma độc téng tiền trong may ca nhân."]}, {"id": "88", "text": "Trong bao mat Container (vi du Docker/Kubernetes) như được nhac toi", "answer": 1, "opts": ["Chay tat ca các Container bang quyén Root dé dam bao tương thich tối da.", "Thực hién Image Scanning dé tim 16 héng trước khi trién khai va áp dung Least Privilege (Không chạy với quyén root).", "Tat hoan toan Tường lửa dé Container giao tiếp nhanh hon.", "Cai dat phan mém Antivirus ca nhân vao từng Container."]}, {"id": "89", "text": "Bao mat trong DevOps truyền théng thường xảy ra ở giai doan nao?", "answer": 0, "opts": ["Thuong duoc xử ly ở cuối vòng doi, chi kiém tra trước khi Release gay cham trễ tiền độ.", "Tích hợp liên tục vào từng dòng code.", "Chỉ xử lý lúc thiết kế hệ thống ban đầu.", "Hoàn toàn bị bỏ qua."]}, {"id": "90", "text": "Su xuất hiện của 'Web Shell' trên may chủ chứng td điều gi?", "answer": 1, "opts": ["Quản trị viên vừa cài đặt giao diện điều khiển mới.", "Hệ théng có thé da bi xâm nhập thông qua lỗ héng tai file hoặc RCE, hacker da dat một công cy dé diéu khién may chủ từ xa qua giao dién web.", "Server dang thực hién backup dữ liệu.", "Co’ sở dữ liệu dang nang cap."]}, {"id": "91", "text": "Cau hinh phan quyền nao trên hệ điều hanh Linux giúp ngăn chan các", "answer": 1, "opts": ["Cap quyén 777 cho moi thu muc.", "Loai bd quyén Write (w) của người dung thông thường déi voi các thu mục như /etc va /bin.", "Cho phép moi user st? dung lệnh sudo ma khong can mat khau.", "An cac file hé thống di."]}, {"id": "92", "text": "Giải pháp nao là hiéu qua nhat dé chéng lai rủi ro bi bẻ khóa mat khau", "answer": 1, "opts": ["Chi sử dung chữ thường dé gõ nhanh hon.", "Ap dung xac thực da yếu tố (MFA) két hop voi chinh sách khóa tai khoản (Account Lockout) sau nhiéu lan thử sai.", "Luu trữ mat khẩu dang Plaintext.", "Khởi động lại máy chủ mỗi ngày."]}, {"id": "93", "text": "Logic Flaw (Lỗ hồng Logic) trong ng dung web có thé bi phat hién dé", "answer": 2, "opts": ["Trinh quét lỗ héng tw động (Scanner) luôn tim ra 100%.", "Firewall tw động chan.", "Thuong rat khó phat hiện tw dong, yéu cau kiém tht viên bao mat phải rà soát thủ công luồng nghiép vu của ứng dung.", "Antivirus cài trên máy Server."]}, {"id": "94", "text": "Khai niệm 'Attack Surface’ (Bé mat tan cong) trong bao mat hệ thống", "answer": 1, "opts": ["Giao dién trang chu cua Website.", "Tổng sé diém (endpoints), giao dién, API, cng mang... có thé bi loi dung dé xâm nhập vào hé thống.", "Mức độ thiệt hại đo bằng tiền.", "Số lượng máy tính bị nhiễm virus trong mạng."]}, {"id": "95", "text": "Mot trong những phương pháp giảm thiéu 'Attack Surface' hiệu qua là gi?", "answer": 1, "opts": ["Mở toàn bộ céng mang du phòng.", "Gỡ bỏ các dich vu, phan mém không can thiết, vô hiệu hóa các API hoặc giao thức cũ (như Telnet, FTP).", "Tăng số lượng tài khoản quản trị viên lên.", "Sử dụng nhiều hệ quản trị CSDL cùng lúc."]}, {"id": "96", "text": "Ky thuật 'Sanitization' déi voi dữ liệu dau vào có nghĩa là gi?", "answer": 1, "opts": ["Chan hoàn toàn bat ky ai có dia chi IP la tai dữ liệu lên.", "Lam sach dữ liéu, loai bỏ hoặc ma hóa cac ky tw đặc biét có kha nang thực thi ma độc trước khi hé thong xử ly (như xóa thé <script>).", "Mã hóa MD5 cho toàn bộ dữ liệu người dùng nhập.", "Nén dữ liệu người dung thành file zip."]}, {"id": "97", "text": "Tai sao việc thiết ké hé thống theo mô hình 'Microservices' (Dich vu vi m6)", "answer": 1, "opts": ["Vi nó lam cho hé thong chay cham hon, Hacker nan chi.", "Phan tach rõ rang trách nhiém, han ché ban kinh anh hưởng (Blast Radius) néu mot dich vu nhỏ bi tan công, cac dich vu khác van an toàn.", "Không can sử dung API Gateway nữa.", "Loại bỏ hoàn toàn lỗ hồng SQL Injection."]}, {"id": "98", "text": "Khai niệm 'Insider Threat' (Mối de doa nội bộ) dé cap đến nhóm déi tượng", "answer": 2, "opts": ["Nhóm tin tặc hoạt động ngoài lãnh thé.", "Ma độc xâm nhap sau vao Kernel của hệ điều hanh.", "Nhân vién cũ/hiện tai, nha thau hoặc déi tac da có quyén truy cap hợp pháp vao hé thống, nhưng cé ý hoặc vo y gay ro ri dữ liệu.", "Cac công cu tw động do quét mat khau từ Internet."]}, {"id": "99", "text": "Giao thức nao cung cap co’ ché bao mat (ma hóa va toan ven dữ liu) cho", "answer": 1, "opts": ["HTTP", "TLS/SSL (Tao nén HTTPS)", "FTP", "Telnet"]}, {"id": "100", "text": "Chức nang 'Logging & Monitoring’ liên tuc trong bao mat hệ thống giúp", "answer": 1, "opts": ["Bao mat tuyệt đối (100% Confidentiality).", "Giúp phat hién sớm các di thường, phuc vu truy vét diéu tra (Accounting) dé duy tri sw Toan ven (Integrity) va San sang (Availability).", "Ngan chan moi cuộc tan công Phishing.", "Tw động déi mat khẩu CSDL."]}, {"id": "101", "text": "Trong quy trinh phat triển phan mém an toàn (SSDLC), ky thuat 'Threat", "answer": 1, "opts": ["Giai doan Trién khai (Deployment)", "Giai doan Thiét ké kién tric (Design)", "Giai doan Van hanh (Operations)", "Giai doan Xóa bỏ hệ thống"]}, {"id": "102", "text": "Muc dich chinh cua \"Threat Modeling la gi?", "answer": 0, "opts": ["Dự doan va xac dinh các mdi de doa tiém An dé thiết kế các bién pháp giảm nhe trước khi viét code.", "Quét ma nguồn dé tim lỗi cú pháp.", "Mã hóa cơ sở dữ liệu khách hàng.", "Kiểm tra tóc độ tai trang web."]}, {"id": "103", "text": "Hình thức tan công 'Whaling' la một bién thé của Phishing, nhưng co đặc", "answer": 1, "opts": ["Sử dung mang xã hội dé phat tan tin nhắn rac.", "Chi nhắm mục tiéu vào các nhan vat cap cao trong tổ chức (như CEO, CFO).", "Sử dung ma độc téng tién thay vi danh cap mat khẩu.", "Tan céng qua mang WiFi công cộng."]}, {"id": "104", "text": "Trong mat ma hoc, ham bam (Hash Function) được sử dung chủ yéu dé", "answer": 1, "opts": ["Tinh bao mat (Confidentiality)", "Tinh toan ven (Integrity)", "Tinh san sang (Availability)", "Tinh an danh"]}, {"id": "105", "text": "Dé bao vé mat khẩu người dùng lưu trong cơ sở dữ liệu an toàn nhat,", "answer": 2, "opts": ["Luu dưới dang van ban rõ (Plaintext).", "Ma héa bang thuật toán déi xứng AES.", "St dung ham bam (như Bcrypt, Argon2) két hop với chuỗi Salt ngẫu nhién.", "St dung ham bam MD5 không có Salt."]}, {"id": "106", "text": "Chuỗi 'Salt' trong qua trinh bam mat khẩu co tac dung gi?", "answer": 1, "opts": ["Lam cho mat khau dé nhớ hon.", "Ngan chan tan công bang bang tra cứu bam (Rainbow Tables) do tao ra các ma bam khac nhau cho cling một mat khau.", "Giúp nén kích thước mat khau.", "Giúp khôi phục lại mật khẩu gốc khi người dùng quên."]}, {"id": "107", "text": "Su khác biét giữa ma hóa déi xứng (Symmetric) va bat đối xứng", "answer": 0, "opts": ["Ma hóa déi xứng dung chung một khóa dé ma hóa va giải ma; bat đối xứng dung cap khóa (Public/Private key).", "Ma hóa déi xứng cham hon bat đối xứng rat nhiéu.", "Ma hóa bat déi xứng không thé giải ma được.", "Ma hóa déi xứng chi dung cho dé liệu van ban."]}, {"id": "108", "text": "Giao thức SSL/TLS sử dung phương phap ma hóa nao dé tối ưu hóa", "answer": 2, "opts": ["Chi sử dung ma hóa déi xứng.", "Chi ste dung ma hóa bat đối xứng.", "Dung ma hoa bat déi xứng dé trao déi khóa ban dau, sau do dùng khóa đối xứng dé truyền dé liéu.", "Khong str dung ma hóa, chi dùng chữ ky sé."]}, {"id": "109", "text": "Xác thực da yéu t6 (MFA - Multi-Factor Authentication) yêu cau người", "answer": 1, "opts": ["Something you know (Thứ ban biết - VD: Mat khau)", "Something you have (Tht ban có - VD: Điện thoại nhận SMS)", "Something you are (Tht thuộc vé ban - VD: Sinh trac hoc)", "Somewhere you are (Noi ban ở - VD: Vi tri GPS)"]}, {"id": "110", "text": "Trong hệ thống IDS/IPS, canh bao gia (False Positive) nghia là gi?", "answer": 1, "opts": ["Hé thống bỏ lot một cuộc tan công thực sự.", "Hệ thống canh bao có tan cong nhưng thực chat do la lưu lượng mang hop lệ của người dùng bình thường.", "Hệ thống bị sập do quá tải.", "Hệ thống chặn thành công một mã độc."]}, {"id": "111", "text": "Ngược lai, hiện tượng bỏ lot (False Negative) trong hệ thống an ninh", "answer": 1, "opts": ["Canh bao sai lưu lượng binh thường.", "Cuộc tan cong thực sự xảy ra nhưng hệ thống khong phat hién va khong dua ra cảnh báo nào.", "Mat khau bi sai nhiéu làn.", "Hé thống tu dong ngắt kết néi Internet."]}, {"id": "112", "text": "Ky thuật 'Baiting' trong Social Engineering la gi?", "answer": 1, "opts": ["Goi dién thoai mao danh nhan vién IT.", "Cé tinh bỏ lai các USB chứa ma độc ở noi công cộng (như bai xe) dé nan nhân tò mo nhặt về cắm vao may tinh.", "Di theo người khác qua céng an ninh ma không can quet thé (Tailgating).", "Duc thùng rac dé tim tai liệu nhạy cam (Dumpster diving)."]}, {"id": "113", "text": "Khi thiét ké tng dung cho phép người dung tai lên hình anh (File", "answer": 0, "opts": ["Chi kiém tra phan đuôi mở rộng cua file ở phia giao dién Client (JavaScript).", "Kiém tra MIME type & phia Backend.", "Kiém tra Magic Bytes ở dau file.", "Quét virus file bang công cu tich hop trước khi lưu trữ."]}, {"id": "114", "text": "Một ng dung web hién thi URL như sau:", "answer": 1, "opts": ["SQL Injection", "Directory Traversal (LFI - Local File Inclusion)", "Cross-Site Scripting (XSS)", "CSRF"]}, {"id": "115", "text": "M6 hinh ‘Trach nhiệm chung' (Shared Responsibility Model) trong bao", "answer": 2, "opts": ["Nha cung cap Cloud chiu 100% trach nhiém vé bao mat.", "Nguoi dùng chiu 100% trach nhiệm về bao mat.", "Nha cung cap bao vé ha tang vat ly va nén tang; Khach hang chiu trach nhiém bao mat dữ liệu, ứng dung va cau hinh của ho trén dam may.", "Céng ty bao hiém sé dén bu moi rủi ro."]}, {"id": "116", "text": "Chứng chi sé (Digital Certificate) dựa trên chuan X.509 được cap phat", "answer": 0, "opts": ["Tổ chức chứng thực (CA - Certificate Authority)", "Nhà cung cấp dịch vụ mạng (ISP)", "Tổ chức Y tế thé giới (WHO)", "Bộ Thông tin và Truyền thông"]}, {"id": "117", "text": "M6 hinh Cyber Kill Chain (Chuỗi tiêu diệt mang) do Lockheed Martin dé", "answer": 1, "opts": ["Cach thức viết phan mém an toan.", "Cac giai doan tuần tw ma ké tan cong thường thực hién dé xam nhap va danh cap dé liéu, từ thăm dd dén hanh động cuối cùng.", "Cau trúc mang của doanh nghiệp.", "Sự phân quyền trong cơ sở dữ liệu."]}, {"id": "118", "text": "Trong Cyber Kill Chain, giai doan 'Reconnaissance' (Tham do) tin tac", "answer": 1, "opts": ["Gui ma độc vao email.", "Thu thap thông tin tinh bao về mục tiêu (như email nhân vién, cau trúc mang, loai may chủ) từ các nguồn mở (OSINT).", "Cai dat Rootkit vào hệ théng.", "Rut dữ liệu ra ngoài (Exfiltration)."]}, {"id": "119", "text": "Lỗ hồng SSRF (Server-Side Request Forgery) có mức độ nguy hiểm", "answer": 1, "opts": ["Ep trình duyét người dung gửi request.", "Lừa may chủ Web gửi một yéu cau mang toi một hé théng nội bộ khác ma thông thường khong được phép truy cap từ Internet.", "Lam thay déi giao dién ứng dung web.", "Xóa cookie phién lam việc."]}, {"id": "120", "text": "Bao mat ứng dung (AppSec) hién dai không chi phy thuộc vao WAF ma", "answer": 1, "opts": ["Hoat động như một Firewall cứng trước mang.", "Được gắn trực tiếp vào trong môi trường thực thi của ứng dụng, giúp ứng dụng tự giám sát và chặn hành vi độc hại từ bên trong khi đang chạy.", "Quét mã nguồn tĩnh.", "Quản lý mật khẩu người dùng."]}, {"id": "121", "text": "Khai niém ‘Vulnerability Management’ (Quan ly lỗ héng) là một quy trinh", "answer": 1, "opts": ["La mét hoat dong chi lam một lằn khi mua may chủ mdi.", "La mot chu trinh liên tục bao gdm quét dinh ky, phan loại rủi ro, va lỗi va xác nhan lai.", "La qua trinh viét ma độc gia lap.", "La quy trình khởi động lai tường lửa."]}, {"id": "122", "text": "Trong bao cao kiểm thử bao mat (Penetration Testing), lỗ hồng 'Critical'", "answer": 1, "opts": ["Lỗi can sw tương tac phức tap của người dung mdi có thé khai thac.", "Lỗ héng co thé bi khai thác dé dang, trực tiếp từ xa va gay hau qua thảm khéc (chiếm quyén may chu, lộ toàn bộ CSDL).", "Lỗi thiết kế giao diện không đẹp.", "Lỗi cAu hình tiêu chuan."]}, {"id": "123", "text": "Phương pháp 'Fuzzing' (Kiểm thử mờ) trong bảo mật ứng dụng hoạt", "answer": 0, "opts": ["Gửi các dé liệu rac, ngẫu nhiên, không hợp lệ hoặc qua khé vào ứng dung voi khối lượng Ion dé xem ứng dung co bi crash hoặc sinh lỗi bat thường hay không.", "Doc từng dong ma nguồn dé tim lỗi logic.", "Ma héa dung truyén bang giao thức SSL.", "St dung Al dé téi wu hóa code."]}, {"id": "124", "text": "Dé bao mat dữ liéu lưu trữ (Data at Rest) trên may cht co’ sở dữ liệu,", "answer": 0, "opts": ["Ma hóa 6 dia vat ly hoặc ma hóa cap dé bảng/trường dữ liệu (TDE).", "Ste dung cap quang téc độ cao.", "Sw dung SSL/TLS.", "An file dữ liệu."]}, {"id": "125", "text": "Thuật toán AES-256 có con số 256 thé hiện diéu gi?", "answer": 1, "opts": ["Thời gian giải ma la 256 giây.", "Độ dai cla khóa ma hoa là 256 bit.", "Thuật toan chia dữ liệu thành 256 khdi.", "Số người có thể dùng chung khóa."]}, {"id": "126", "text": "Rủi ro chính của việc sử dụng các thành phần bên thứ ba (Third-party", "answer": 1, "opts": ["Làm giao diện kém tương thích với mobile.", "Cac thanh phan nay có thé chứa các lỗ héng da được cong bé rộng rai (CVE), khién ứng dung tro thanh mục tiéu dé dang của các ma khai thác co san.", "Lam tang dung lượng RAM.", "Vi pham ban quyén hinh anh."]}, {"id": "127", "text": "Giải pháp ‘Disaster Recovery Plan' (Ké hoach phục hồi sau tham hoa)", "answer": 2, "opts": ["Tinh bao mat (Confidentiality)", "Tinh toan ven (Integrity)", "Tinh san sang (Availability)", "Tinh xac thực"]}, {"id": "128", "text": "Backup dữ liệu tuân theo quy tac 3-2-1 được hiéu như thé nao?", "answer": 1, "opts": ["Luu 3 ban copy, vao 2 gid’ sang, bang 1 phan mém.", "Có 3 ban sao dữ liéu, lưu trén 2 loai phương tién lưu trữ khác nhau, với 1 ban sao được lưu ở địa điểm ngoài (Off-site/Cloud).", "Có 3 ky su quan ly, 2 may chu dy phòng, 1 đường mang.", "Sao lưu 3 lan trong 2 thang cho 1 dự an."]}, {"id": "129", "text": "Tan cong 'XML External Entity' (XXE) xảy ra ở dau?", "answer": 1, "opts": ["Trong b6 nhớ RAM cua Server.", "Trong qua trình bộ phan tich cu phap (Parser) cua ứng dung xử ly file XML co chứa các tham chiéu thực thé mở rộng độc hai.", "Trên cac định dang file anh JPEG.", "Trong giao thức mang TCP."]}, {"id": "130", "text": "Trong bao mat mang, khai niệm 'MAC Spoofing’ la hanh vi gi?", "answer": 1, "opts": ["Tan công may tinh chay hệ điều hành macOS.", "Gia mao dia chi vat ly (MAC Address) của mot thiét bi mang hop phap dé qua mat hệ thống kiểm soát truy cap (như mang WiFi doanh nghiệp).", "Ngắt cáp mạng vật lý.", "Làm nhiễu sóng Bluetooth."]}, {"id": "131", "text": "Tại sao việc 'Hardcode' (Viết cứng) mật khẩu hoặc API Key trực tiếp vào", "answer": 1, "opts": ["Vino lam cho ma nguồn chay cham hon.", "Vi mã nguồn có thé bi rò ri hoặc dich ngược (Reverse engineering), dan dén việc 16 mat khẩu một cach dé dang.", "Vi trình bién dich không hé tro.", "Vino lam tang dung lượng file exe."]}, {"id": "132", "text": "Biện pháp thay thé tốt nhat cho việc Hardcode mat khẩu vao mã nguồn", "answer": 0, "opts": ["Sử dung biến môi trường (Environment Variables) hoặc các hệ thống quan ly Secret chuyên dụng (như HashiCorp Vault, AWS Secrets Manager).", "Viết mật khẩu ra một file text lưu trên desktop máy chủ.", "Ghi nhớ trong đầu và nhập bằng tay mỗi lằn chạy ứng dụng.", "Sử dụng mật khẩu mặc định của framework."]}, {"id": "133", "text": "Theo bao cdo của OWASP Top 10, 'Broken Access Control’ (Lỗi kiểm", "answer": 1, "opts": ["Nguoi dùng quén mat khau.", "Nguoi dùng co thé thực hiện các hành động ngoài quyén han thiết ké của ho (vi du: người dung thường xem được trang Admin).", "Hé théng bi cup dién.", "Firewall chan nhằm người dung hop phap."]}, {"id": "134", "text": "Ky thuat phan tich rủi ro định lượng (Quantitative Risk Analysis) khac với", "answer": 1, "opts": ["Dinh lượng chi dung cho công ty nhỏ.", "Dinh lượng sử dung các gia tri tai chinh va xác suat bang sé liệu thống ké cu thé (vi du: thiệt hai 100.000, xác suất 5%); dinh tinh dung mức dé (Cao, Trung binh, Thấp).", "Dinh lượng lam mat thoi gian hon va không chinh xác bang.", "Dinh lượng khong danh gia hé thống mang."]}, {"id": "135", "text": "Tan cong 'DNS Spoofing' (Gia mao DNS) co tac động gi đến người", "answer": 1, "opts": ["Lam người dùng không thé truy cap bat ky trang web nao.", "Chuyén hướng (Redirect) người dung từ một tên mién hop pháp sang mot dia chi IP chứa trang web gia mao do hacker kiém soát.", "Xda toan bộ bộ nhớ Cache cua trình duyệt.", "Déi mat khẩu WiFi của người dung."]}, {"id": "136", "text": "Khái niệm 'Sandboxing' trong bảo mật hệ điều hành là gì?", "answer": 1, "opts": ["Luu trữ dữ liệu ra 6 cứng ngoài.", "Một co’ chế cô lap an toan, trong dé các chương trình hoặc ma không tin cay được thực thi trong một môi trường bị hạn chế nghiêm ngặt, không thể ảnh hưởng đến hệ thống chính.", "Phan mém don rac hé thong.", "Giao dién dong lệnh cua Linux."]}, {"id": "137", "text": "Tai sao viéc dung mat khau có dé dai lớn (vi du: Passphrase trén 15 ky", "answer": 1, "opts": ["Vi cac hé théng không cho phép nhập ky tự dac biét.", "Vi độ dai lam tang theo cap sé nhan khong gian toan hoc của các trường hop vét can (Brute Force), khién thoi gian bé khóa trở nén bat kha thi so voi mat khẩu ngan.", "Vi mat khau dai dé nhớ hon.", "Vi cac công cu hacker không g6 duoc cht cai thường."]}, {"id": "138", "text": "Chức nang cua ‘Jump Server’ (May chu nhay/Bastion Host) trong quan", "answer": 1, "opts": ["May chu đóng vai tro như router mang LAN.", "La một may cht duy nhat cd độ bao mat cực cao, được dung lam điểm kiểm soát trung gian dé quan tri viên truy cập vào các hệ thống nhay cam bén trong mang nội bộ.", "Máy chủ chuyên dùng để chơi game.", "May cht tw động nhảy IP dé tránh bi tan công."]}, {"id": "139", "text": "Một nhan vién IT roi công ty nhưng tai khoản mang của người dé không", "answer": 1, "opts": ["Quy trinh va lỗi (Patch Management).", "Quy trinh cấp/thu hồi quyền truy cap (Identity and Access Management / Offboarding).", "Quy trinh ma hoa dữ liệu.", "Quy trinh bao tri phan cứng."]}, {"id": "140", "text": "Giao thức SSH (Secure Shell) thường dung céng mac dinh nao dé quan", "answer": 2, "opts": ["Port 80", "Port 443", "Port 22", "Port 21"]}, {"id": "141", "text": "Dé ngăn chan tan cong từ chối dich vu (DoS) vao ứng dung Web, ky", "answer": 1, "opts": ["Mở rộng kích thước file Upload téi da.", "Thiét lap Timeout (Thời gian cho) hợp ly va giới han kich thước Request Header/Body.", "Cho phép chạy Script voi quyén Root.", "Hién thi thong bao lỗi chi tiết ra man hình."]}, {"id": "142", "text": "Tan công 'Cryptojacking' có nghia la gi?", "answer": 1, "opts": ["Bé khóa các thuật toán mat ma của hé thống.", "Cai ma độc lén lút sử dung tai nguyên CPU/GPU cua nan nhan dé dao tiền điện tử cho hacker.", "Ma hóa dé liệu va tống tiền bang Bitcoin.", "Đánh cắp ví điện tử lạnh."]}, {"id": "143", "text": "Khi nhận được một email yêu cau déi mat khẩu ngân hang kèm theo", "answer": 1, "opts": ["Click ngay vào link va đổi mat khẩu dé bao dam an toàn.", "Bỏ qua email, tự gõ dia chi trang web chính thức cua ngan hang vao trinh duyệt dé kiểm tra.", "Chuyén tiép email cho ban bè hai y kiến.", "Nhan tin phan hồi lai email do."]}, {"id": "144", "text": "Lỗ héng bao mat dang ‘Business Logic' (Lỗ héng nghiép vy) khác biệt ở", "answer": 1, "opts": ["Lién quan dén lỗi phan cứng mang.", "Khong xuất phat từ lỗi cú pháp hay ma hóa, ma do sự s var quiz = [];
var answers = [];
var currentIdx = 0;
var phase = 'initial';
var wrongQuiz = [];
var wrongAnswers = [];
var wrongIdx = 0;

function shuffle(arr) {
  for (var i = arr.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = arr[i]; arr[i] = arr[j]; arr[j] = tmp;
  }
  return arr;
}

function startQuiz() {
  phase = 'initial';
  quiz = ALL_QUESTIONS.slice();
  shuffle(quiz);
  answers = [];
  for (var i = 0; i < quiz.length; i++) answers.push(-1);
  currentIdx = 0;
  document.getElementById('info').textContent = '150 câu hỏi An toàn thông tin';
  document.getElementById('startScreen').style.display = 'none';
  document.getElementById('resultScreen').style.display = 'none';
  document.getElementById('quizArea').style.display = 'block';
  renderDots();
  renderQ();
}

function renderDots() {
  var qList = phase === 'retry' ? wrongQuiz : quiz;
  var aList = phase === 'retry' ? wrongAnswers : answers;
  var idx = phase === 'retry' ? wrongIdx : currentIdx;
  var container = document.getElementById('qDots');
  container.innerHTML = '';
  for (var i = 0; i < qList.length; i++) {
    var dot = document.createElement('div');
    dot.className = 'dot' + (i === idx ? ' current' : '');
    if (aList[i] >= 0) dot.classList.add('answered');
    dot.textContent = i + 1;
    dot.onclick = (function(i2) { return function() { goToQ(i2); }; })(i);
    container.appendChild(dot);
  }
}

function updateDots() {
  var qList = phase === 'retry' ? wrongQuiz : quiz;
  var aList = phase === 'retry' ? wrongAnswers : answers;
  var idx = phase === 'retry' ? wrongIdx : currentIdx;
  var dots = document.querySelectorAll('.dot');
  for (var i = 0; i < dots.length; i++) {
    var dot = dots[i];
    dot.className = 'dot';
    if (i < qList.length) {
      if (aList[i] >= 0) dot.classList.add('answered');
      if (i === idx) dot.classList.add('current');
      dot.style.display = '';
    } else {
      dot.style.display = 'none';
    }
  }
}

function renderQ() {
  var isRetry = phase === 'retry';
  var qList = isRetry ? wrongQuiz : quiz;
  var aList = isRetry ? wrongAnswers : answers;
  var idx = isRetry ? wrongIdx : currentIdx;
  var q = qList[idx];
  if (!q) return;

  document.getElementById('qBadge').textContent = (isRetry ? 'Làm lại - ' : '') + 'Câu ' + q.id;
  document.getElementById('qText').textContent = q.text;

  document.getElementById('qCounter').textContent = (idx + 1) + ' / ' + qList.length;
  document.getElementById('progressFill').style.width = ((idx + 1) / qList.length * 100) + '%';

  var container = document.getElementById('options');
  container.innerHTML = '';

  var selected = aList[idx];
  for (var i = 0; i < q.opts.length; i++) {
    var btn = document.createElement('button');
    btn.className = 'opt';
    if (selected >= 0) {
      btn.classList.add('disabled');
      btn.classList.add('answered');
      if (i === q.answer) btn.classList.add('correct');
      if (i === selected && i !== q.answer) btn.classList.add('wrong');
    } else {
      btn.onclick = (function(i2) { return function() { selectOpt(i2); }; })(i);
    }
    btn.textContent = (i + 1) + '. ' + q.opts[i];
    container.appendChild(btn);
  }

  document.getElementById('prevBtn').disabled = idx === 0;
  if (isRetry) {
    document.getElementById('nextBtn').textContent = idx === qList.length - 1 ? 'Xem tổng kết ▶' : 'Sau ▶';
  } else {
    document.getElementById('nextBtn').textContent = idx === qList.length - 1 ? 'Xem kết quả ▶' : 'Sau ▶';
  }
  updateDots();
}

function selectOpt(i) {
  var isRetry = phase === 'retry';
  var aList = isRetry ? wrongAnswers : answers;
  var idx = isRetry ? wrongIdx : currentIdx;
  if (aList[idx] >= 0) return;
  aList[idx] = i;
  renderQ();
  var allDone = aList.every(function(a) { return a >= 0; });
  if (allDone) {
    setTimeout(isRetry ? showFinalSummary : showResult, 600);
  }
}

function nextQ() {
  if (phase === 'retry') {
    if (wrongIdx < wrongQuiz.length - 1) { wrongIdx++; renderQ(); }
    else { showFinalSummary(); }
  } else {
    if (currentIdx < quiz.length - 1) { currentIdx++; renderQ(); }
    else { showResult(); }
  }
}

function prevQ() {
  if (phase === 'retry') {
    if (wrongIdx > 0) { wrongIdx--; renderQ(); }
  } else {
    if (currentIdx > 0) { currentIdx--; renderQ(); }
  }
}

function goToQ(i) {
  if (phase === 'retry') {
    if (i >= 0 && i < wrongQuiz.length) { wrongIdx = i; renderQ(); }
  } else {
    if (i >= 0 && i < quiz.length) { currentIdx = i; renderQ(); }
  }
}

function showResult() {
  wrongQuiz = [];
  wrongAnswers = [];
  for (var i = 0; i < quiz.length; i++) {
    if (answers[i] !== quiz[i].answer) {
      wrongQuiz.push(quiz[i]);
      wrongAnswers.push(-1);
    }
  }

  document.getElementById('quizArea').style.display = 'none';
  document.getElementById('resultScreen').style.display = 'block';

  if (wrongQuiz.length === 0) {
    showFinalSummary();
    return;
  }

  var correct = quiz.length - wrongQuiz.length;
  document.getElementById('scoreDisplay').textContent = correct + ' / ' + quiz.length;
  var pct = Math.round(correct / quiz.length * 100);
  document.getElementById('scoreDetail').textContent = 'Lần 1: ' + correct + '/' + quiz.length + ' đúng (' + pct + '%) - Còn ' + wrongQuiz.length + ' câu sai';

  var btn = document.getElementById('wrongBtn');
  btn.style.display = 'inline-block';
  btn.textContent = '🔄 Làm lại ' + wrongQuiz.length + ' câu sai';

  showReview();
}

function retryWrong() {
  phase = 'retry';
  wrongIdx = 0;
  document.getElementById('info').textContent = 'Làm lại ' + wrongQuiz.length + ' câu sai. Hãy chọn đáp án đúng.';
  document.getElementById('quizArea').style.display = 'block';
  document.getElementById('resultScreen').style.display = 'none';
  renderDots();
  renderQ();
}

function showFinalSummary() {
  phase = 'done';
  document.getElementById('quizArea').style.display = 'none';
  document.getElementById('resultScreen').style.display = 'block';

  var firstCorrect = 0;
  var firstUnanswered = 0;
  for (var i = 0; i < quiz.length; i++) {
    if (answers[i] === -1) firstUnanswered++;
    else if (answers[i] === quiz[i].answer) firstCorrect++;
  }
  var retryCorrect = 0;
  var retryUnanswered = 0;
  for (var i = 0; i < wrongQuiz.length; i++) {
    if (wrongAnswers[i] === -1) retryUnanswered++;
    else if (wrongAnswers[i] === wrongQuiz[i].answer) retryCorrect++;
  }
  var totalCorrect = firstCorrect + retryCorrect;

  var label = 'Lần 1: ' + firstCorrect + '/' + quiz.length + ' đúng';
  if (firstUnanswered > 0) label += ' (' + firstUnanswered + ' câu bỏ qua)';
  if (wrongQuiz.length > 0) {
    label += ' | Làm lại: ' + retryCorrect + '/' + wrongQuiz.length + ' đúng';
    if (retryUnanswered > 0) label += ' (' + retryUnanswered + ' bỏ qua)';
  }
  label += ' | Tổng: ' + totalCorrect + '/' + quiz.length + ' đúng';

  document.getElementById('scoreDisplay').textContent = totalCorrect + ' / ' + quiz.length;
  var pct = Math.round(totalCorrect / quiz.length * 100);
  document.getElementById('scoreDetail').textContent = label + ' | Tỉ lệ: ' + pct + '%';

  document.getElementById('wrongBtn').style.display = 'none';
  showReview();
}

function showReview() {
  var list = document.getElementById('reviewList');
  list.innerHTML = '<h3 style="margin:20px 0 10px">Chi tiết câu hỏi:</h3>';

  for (var i = 0; i < quiz.length; i++) {
    var q = quiz[i];
    var isCorrect = answers[i] === q.answer;
    var notAnswered = answers[i] === -1;
    var wasWrong = false;
    var retried = false;
    var retryOK = false;
    var retryNotAns = false;

    for (var j = 0; j < wrongQuiz.length; j++) {
      if (wrongQuiz[j].id === q.id) {
        wasWrong = true;
        if (wrongAnswers[j] >= 0) retried = true;
        if (wrongAnswers[j] === -1) retryNotAns = true;
        if (wrongAnswers[j] === wrongQuiz[j].answer) retryOK = true;
        break;
      }
    }

    var div = document.createElement('div');
    div.className = 'reviewItem';
    var status = '';
    if (notAnswered && !wasWrong) status = '❌ (bỏ qua)';
    else if (notAnswered && wasWrong && retryNotAns) status = '❌ (bỏ qua)';
    else if (isCorrect && !wasWrong) status = '✅';
    else if (wasWrong && retryOK) status = '⚠️';
    else status = '❌';

    var userText = notAnswered ? '(không làm)' : q.opts[answers[i]];
    var detail = '<div class="rq">' + status + ' Câu ' + q.id + ': ' + q.text + '</div>' +
      '<div class="ra ' + (notAnswered ? 'w' : (isCorrect ? 'c' : 'w')) + '">Lần 1: ' + userText + '</div>';

    if (retried) {
      var retryAns = -1;
      for (var j = 0; j < wrongQuiz.length; j++) {
        if (wrongQuiz[j].id === q.id) { retryAns = wrongAnswers[j]; break; }
      }
      var retryText = retryAns === -1 ? '(không làm)' : q.opts[retryAns];
      detail += '<div class="ra ' + (retryOK ? 'c' : 'w') + '">Làm lại: ' + retryText + '</div>';
    }

    if (!retryOK) {
      detail += '<div class="ra c">Đáp án đúng: ' + q.opts[q.answer] + '</div>';
    }
    div.innerHTML = detail;
    list.appendChild(div);
  }
}

document.getElementById('prevBtn').disabled = true;
</script>
